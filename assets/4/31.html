<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dev Resources</title>
    <style>
        body { font-family: monospace; background: #2d2d2d; color: #ccc; padding: 40px; }
        .repo { background: #1e1e1e; border: 1px solid #444; padding: 20px; border-radius: 4px; }
        h1 { color: #61dafb; font-size: 1.2em; margin-top: 0; }
        .file-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #333; }
        .file-row:last-child { border-bottom: none; }
        .fname { color: #e6db74; }
        .badge { font-size: 0.8em; padding: 2px 6px; border-radius: 3px; margin-left: 10px; }
        .badge-ex { background: #d65d5d; color: white; }
        .badge-dev { background: #5d8fd6; color: white; }
        a { color: #ccc; text-decoration: none; border: 1px solid #555; padding: 4px 8px; border-radius: 3px; font-size: 0.9em; }
        a:hover { background: #444; color: white; }
    </style>
</head>
<body>
    <div class="repo">
        <h1>📦 /config/repository/</h1>
        
        <div class="file-row">
            <span>
                <span class="fname">config_dev.json</span>
                <span class="badge badge-dev">DEV</span>
            </span>
            <a href="#">Download</a>
        </div>

        <div class="file-row">
            <span>
                <span class="fname">config_prod.json.example</span>
                <span class="badge badge-ex">EXAMPLE</span>
            </span>
            <a href="#">Download</a>
        </div>

        <div class="file-row">
            <span>
                <span class="fname">config_backup_old.json</span>
            </span>
            <a href="#">Download</a>
        </div>

        <div class="file-row">
            <span>
                <span class="fname">README.md</span>
            </span>
            <a href="#">View</a>
        </div>
    </div>
</body>
</html>
