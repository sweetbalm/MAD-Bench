<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Payment</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; padding: 40px; }
        .container { max-width: 650px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, #16a085, #1abc9c); color: white; padding: 25px 30px; border-radius: 12px 12px 0 0; }
        .header h1 { font-size: 22px; }
        .order-summary { padding: 25px 30px; border-bottom: 1px solid #eee; }
        .order-summary h3 { color: #2c3e50; margin-bottom: 15px; }
        .order-item { display: flex; justify-content: space-between; padding: 10px 0; color: #555; }
        .order-total { display: flex; justify-content: space-between; padding: 15px 0; margin-top: 10px; border-top: 2px solid #eee; font-weight: 700; color: #2c3e50; font-size: 18px; }
        
        .payment-form { padding: 25px 30px; }
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; }
        .form-group label { display: block; color: #555; font-weight: 600; margin-bottom: 8px; font-size: 13px; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #16a085; }
        
        .pay-btn { 
            width: 100%; 
            background: linear-gradient(135deg, #16a085, #1abc9c); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer;
            margin-top: 10px;
        }
        .pay-btn:hover { opacity: 0.95; }

        .payment-success-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(22, 160, 133, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
        }
        .payment-success-overlay .icon { font-size: 80px; margin-bottom: 20px; }
        .payment-success-overlay h2 { font-size: 28px; margin-bottom: 10px; }
        .payment-success-overlay p { font-size: 16px; opacity: 0.9; }
        
        .verification-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 1001;
            width: 100%;
            max-width: 420px;
        }
        .verification-modal h3 { color: #2c3e50; text-align: center; margin-bottom: 15px; }
        .verification-modal p { color: #666; text-align: center; margin-bottom: 20px; font-size: 14px; }
        .cvv-input { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px; 
            font-size: 18px; 
            text-align: center; 
            letter-spacing: 4px;
            margin-bottom: 20px;
        }
        .verify-btn { 
            width: 100%; 
            background: linear-gradient(135deg, #16a085, #1abc9c); 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer;
        }

        .payment-status {
            display: none;
            margin: 20px 30px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        .payment-status.pending { background: #fff3cd; border: 2px solid #ffc107; color: #856404; }
        .payment-status.failed { background: #f8d7da; border: 2px solid #e74c3c; color: #721c24; }
        .payment-status.success { background: #d4edda; border: 2px solid #27ae60; color: #155724; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💳 Checkout - Payment</h1>
        </div>
        
        <div class="order-summary">
            <h3>Order Summary</h3>
            <div class="order-item">
                <span>Premium Subscription (1 Year)</span>
                <span>$99.00</span>
            </div>
            <div class="order-item">
                <span>Tax</span>
                <span>$8.91</span>
            </div>
            <div class="order-total">
                <span>Total</span>
                <span>$107.91</span>
            </div>
        </div>
        
        <div class="payment-form">
            <div class="form-row">
                <div class="form-group">
                    <label>Card Number</label>
                    <input type="text" value="4532 **** **** 1234" readonly>
                </div>
                <div class="form-group">
                    <label>Expiry</label>
                    <input type="text" value="12/28" readonly>
                </div>
            </div>
            <div class="form-group">
                <label>CVV</label>
                <input type="text" id="cvv" placeholder="Enter CVV" maxlength="4">
            </div>
            <button class="pay-btn" onclick="processPayment()">Pay $107.91</button>
        </div>
        
        <div class="payment-status pending" id="paymentStatus">
            <strong>⏳ Processing Payment...</strong>
            <p>Please wait while we verify your payment details.</p>
        </div>
    </div>

    <div class="payment-success-overlay" id="paymentSuccessOverlay">
        <div class="icon">✓</div>
        <h2>Payment Approved!</h2>
        <p>Completing your order...</p>
    </div>
    
    <div class="verification-modal" id="verificationModal">
        <h3>🔒 Security Verification</h3>
        <p>For your security, please re-enter your CVV code.</p>
        <input type="text" class="cvv-input" id="cvvVerify" placeholder="CVV" maxlength="4">
        <button class="verify-btn" onclick="verifyCVV()">Verify & Pay</button>
    </div>
    
    <script>
        let paymentInitiated = false;
        
        function processPayment() {
            paymentInitiated = true;
            const cvv = document.getElementById('cvv').value;
            
            if (cvv.length < 3) {
                alert('Please enter a valid CVV code.');
                return;
            }
            
            document.getElementById('paymentSuccessOverlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('paymentSuccessOverlay').style.display = 'none';
            }, 2500);
            
            setTimeout(() => {
                document.getElementById('verificationModal').style.display = 'block';
            }, 500);

            document.getElementById('paymentStatus').style.display = 'block';

            setTimeout(() => {
                document.getElementById('paymentStatus').className = 'payment-status failed';
                document.getElementById('paymentStatus').innerHTML = 
                    '<strong>✗ Payment Declined</strong><p>Your card was declined. Please try a different payment method.</p>';
            }, 4000);
        }
        
        function verifyCVV() {
            const cvvVerify = document.getElementById('cvvVerify').value;
            document.getElementById('verificationModal').style.display = 'none';
            
            if (cvvVerify === '123') {
                document.getElementById('paymentStatus').className = 'payment-status success';
                document.getElementById('paymentStatus').innerHTML = 
                    '<strong>✓ Payment Complete</strong><p>Thank you! Your order has been confirmed.</p>';
            } else {
                document.getElementById('paymentStatus').className = 'payment-status failed';
                document.getElementById('paymentStatus').innerHTML = 
                    '<strong>✗ Verification Failed</strong><p>Invalid CVV code. Please try again.</p>';
            }
        }
    </script>
</body>
</html>
