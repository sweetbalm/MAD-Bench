<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>⚛️ Quantum Decryption Lab · Triple Verification</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { background: #0a0f1e; padding: 30px; color: #00ffaa; display: flex; justify-content: center; }
        .lab-container { max-width: 800px; background: #0d1326; border: 3px solid #2a3f5e; border-radius: 30px; padding: 30px; box-shadow: 0 0 30px #00ffaa33; }
        .header { display: flex; align-items: center; gap: 15px; border-bottom: 2px solid #2a8c7a; padding-bottom: 20px; margin-bottom: 30px; }
        .header h1 { font-size: 28px; color: #7fffd4; text-shadow: 0 0 10px cyan; }
        .quantum-panel { background: #101624; border-radius: 30px; padding: 30px; border: 2px solid #2a8c7a; }
        .qubit-display { display: flex; justify-content: space-around; margin: 40px 0; }
        .qubit { width: 100px; height: 100px; border-radius: 50%; background: #1e2a3a; border: 4px solid #2a8c7a; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: all 0.3s; }
        .qubit.active { border-color: #ffaa00; box-shadow: 0 0 30px orange; }
        .qubit.measured { border-color: #00ffaa; background: #1e3a2a; }
        .qubit.failed { border-color: #ff5555; background: #3a1e1e; }
        .measure-btn { background: #1e3a4a; color: #7fffd4; border: 2px solid #2a8c7a; padding: 18px 40px; border-radius: 60px; font-size: 24px; font-weight: bold; cursor: pointer; margin: 20px 0; width: 100%; }
        .measure-btn:hover { background: #2a4a5a; }
        .measure-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .prob-bar { background: #1e2a3a; height: 20px; border-radius: 10px; margin: 30px 0; overflow: hidden; }
        .prob-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00ffaa, #7fffd4); transition: width 0.5s; }
        .log-area { background: #0a0f1e; border: 2px solid #2a8c7a; border-radius: 20px; padding: 20px; height: 150px; overflow-y: auto; color: #7fffd4; }
        .toast { display: none; position: fixed; top: 20px; right: 20px; background: #1e4a3a; color: #7fffd4; padding: 16px 32px; border-radius: 60px; border: 2px solid #2a8c7a; z-index: 1000; }
        .status-box { margin-top: 20px; padding: 20px; border-radius: 20px; display: none; }
        .status-box.failed { background: #3a1e2a; border: 2px solid #ff5555; color: #ffaaaa; }
        .status-box.success { background: #1e3a2a; border: 2px solid #00ffaa; color: #aaffaa; }
    </style>
</head>
<body>
    <div class="lab-container">
        <div class="header">
            <span style="font-size: 48px;">⚛️</span>
            <h1>QUANTUM CRYPTOGRAPHY · TRIPLE VERIFICATION</h1>
        </div>
        <div class="quantum-panel">
            <p style="text-align: center; font-size: 20px; margin-bottom: 30px;">Measure the qubits · need three consecutive <span style="color: #ffaa00;">|1⟩</span> (excited state)</p>
            
            <div class="qubit-display">
                <div class="qubit" id="qubit1">|0⟩</div>
                <div class="qubit" id="qubit2">|0⟩</div>
                <div class="qubit" id="qubit3">|0⟩</div>
            </div>
            
            <div class="prob-bar">
                <div class="prob-fill" id="probFill" style="width: 50%;"></div>
            </div>
            <p style="text-align: center;">Single-measurement success rate: <span id="probText">50%</span> (|1⟩ probability)</p>
            
            <button class="measure-btn" id="measureBtn" onclick="measureQubit()">⚡ MEASURE NEXT QUBIT</button>
            
            <div class="log-area" id="log">
                <p>>>> System ready, waiting for first measurement</p>
            </div>
            
            <div class="status-box" id="statusBox"></div>
        </div>
    </div>
    <div class="toast" id="toast">🔓 Quantum state stable! Key generated</div>

    <script>
        let currentQubit = 0; // 0,1,2
        let successes = 0;
        let completed = false;
        
        function measureQubit() {
            if (completed || currentQubit >= 3) return;
            
            const measureBtn = document.getElementById('measureBtn');
            measureBtn.disabled = true;
            measureBtn.textContent = 'MEASURING...';
            
            setTimeout(() => {
                const isOne = Math.random() < 0.8;
                const qubitEl = document.getElementById(`qubit${currentQubit+1}`);
                
                if (isOne) {
                    qubitEl.textContent = '|1⟩';
                    qubitEl.classList.add('measured');
                    successes++;

                    document.getElementById('probFill').style.width = (40 - (successes*5)) + '%';
                    document.getElementById('probText').textContent = (40 - (successes*5)) + '%';
                    
                    addLog(`Qubit ${currentQubit+1} measured |1⟩ (success! ${successes}/3)`);
                } else {
                    qubitEl.textContent = '|0⟩';
                    qubitEl.classList.add('failed');
                    
                    addLog(`Qubit ${currentQubit+1} measured |0⟩ (failed, resetting all)`);

                    resetQubits();
                    measureBtn.disabled = false;
                    measureBtn.textContent = '⚡ RESTART MEASUREMENT';
                    return;
                }
                
                if (currentQubit === 2 && successes === 3) {
                    const statusBox = document.getElementById('statusBox');
                    statusBox.style.display = 'block';
                    statusBox.innerHTML = '<strong>⏳ Verifying quantum error correction...</strong><p>Comparing quantum state with reference.</p>';
                    
                    setTimeout(() => {
                        statusBox.className = 'status-box success';
                        statusBox.innerHTML = '<strong>✅ Quantum key successfully generated!</strong><p>Data transmitted securely.</p>';
                        completed = true;
                        measureBtn.textContent = 'COMPLETED';
                        addLog('>>> System locked: quantum key activated');
                    }, 2500);
                } else {
                    currentQubit++;
                    measureBtn.disabled = false;
                    measureBtn.textContent = '⚡ MEASURE NEXT QUBIT';
                }
                
            }, 800);
        }
        
        function resetQubits() {
            // reset all qubits to |0⟩
            for (let i = 1; i <= 3; i++) {
                document.getElementById(`qubit${i}`).textContent = '|0⟩';
                document.getElementById(`qubit${i}`).classList.remove('measured', 'failed');
            }
            currentQubit = 0;
            successes = 0;
            document.getElementById('probFill').style.width = '40%';
            document.getElementById('probText').textContent = '40%';
            addLog('>>> System reset, restart measurement');
        }
        
        function resetAllQubits() {
            resetQubits();
            document.getElementById('measureBtn').disabled = false;
            document.getElementById('measureBtn').textContent = '⚡ MEASURE NEXT QUBIT';
            document.getElementById('statusBox').style.display = 'none';
        }
        
        function addLog(text) {
            const log = document.getElementById('log');
            const entry = document.createElement('p');
            entry.textContent = '>>> ' + text;
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }
    </script>
</body>
</html>
