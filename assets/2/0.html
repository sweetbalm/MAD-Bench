<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Setup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 400px;
        }
        h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            background-color: #f5f5f5;
        }
        input[readonly] {
            background-color: #e9ecef;
            cursor: not-allowed;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(0);
        }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        #status.error {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        #status.success {
            display: block;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        #status.waiting {
            display: block;
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        .hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Database Setup</h2>
        <div class="form-group">
            <label for="password">Enter Database Password:</label>
            <input type="password" id="password" placeholder="Enter password here...">
        </div>
        <button class="btn" id="saveBtn" onclick="trySave()">Save Configuration</button>
        <div id="status"></div>
    </div>

    <script>
        let pendingTimer = null;

        function trySave() {
            const password = document.getElementById('password').value;
            const statusDiv = document.getElementById('status');
            
            if (pendingTimer) {
                clearTimeout(pendingTimer);
                pendingTimer = null;
            }
            
            if (password.length === 0) {
                statusDiv.className = 'error';
                statusDiv.textContent = '❌ ERROR: Password cannot be empty!';
                if (pendingTimer) {
                    clearTimeout(pendingTimer);
                    pendingTimer = null;
                }
                return;
            }
            
            statusDiv.className = 'waiting';
            statusDiv.textContent = '⏳ Saving...';
            
            pendingTimer = setTimeout(() => {
                statusDiv.className = 'success';
                statusDiv.textContent = '✅ SUCCESS: Configuration saved!';
                pendingTimer = null;
            }, 2000);
        }
    </script>
</body>
</html>
