<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Software Update</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #121826; font-family: 'SF Pro Display', -apple-system, system-ui, sans-serif; padding: 40px; }
        .window { max-width: 700px; margin: 0 auto; background: #1f2937; border-radius: 24px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); overflow: hidden; border: 1px solid #374151; }
        .titlebar { background: #111827; padding: 18px 25px; display: flex; align-items: center; gap: 12px; color: #e5e7eb; border-bottom: 1px solid #374151; }
        .titlebar .icon { font-size: 22px; }
        .titlebar .title { font-size: 16px; font-weight: 500; flex: 1; }
        .titlebar .close { width: 14px; height: 14px; background: #ef4444; border-radius: 50%; }
        .content { padding: 35px; }
        .update-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .update-icon { background: #2563eb; width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: white; }
        .update-info h2 { color: white; font-size: 24px; margin-bottom: 6px; }
        .update-info p { color: #9ca3af; font-size: 15px; }
        .version-card { background: #2d3748; border-radius: 20px; padding: 20px; margin-bottom: 25px; border: 1px solid #4b5563; }
        .version-row { display: flex; justify-content: space-between; color: #d1d5db; padding: 12px 0; border-bottom: 1px solid #4b5563; }
        .version-row:last-child { border-bottom: none; }
        .version-label { font-weight: 500; }
        .version-value { color: #fbbf24; font-family: monospace; }
        .progress-section { margin: 30px 0; }
        .progress-label { display: flex; justify-content: space-between; color: #9ca3af; margin-bottom: 8px; }
        .progress-bar-bg { background: #374151; height: 10px; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #2563eb, #3b82f6); transition: width 0.3s; }
        .update-btn { background: #2563eb; color: white; border: none; padding: 16px 32px; border-radius: 60px; font-size: 16px; font-weight: 600; cursor: pointer; margin-right: 15px; transition: all 0.2s; }
        .update-btn:hover { background: #1d4ed8; }
        .update-btn:disabled { background: #4b5563; cursor: not-allowed; }
        .toast { display: none; position: fixed; top: 20px; right: 20px; background: #059669; color: white; padding: 16px 28px; border-radius: 100px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 999; }
        .status-box { margin-top: 25px; padding: 20px; border-radius: 16px; display: none; }
        .status-box.success { background: #064e3b; border: 2px solid #10b981; color: #d1fae5; }
        .status-box.failed { background: #7f1d1d; border: 2px solid #ef4444; color: #fee2e2; }
    </style>
</head>
<body>
    <div class="window">
        <div class="titlebar">
            <span class="icon">🔄</span>
            <span class="title">Software Update</span>
            <div class="close"></div>
        </div>
        <div class="content">
            <div class="update-header">
                <div class="update-icon">⬇️</div>
                <div class="update-info">
                    <h2>macOS Sequoia 15.1</h2>
                    <p>New features and security improvements</p>
                </div>
            </div>
            
            <div class="version-card">
                <div class="version-row">
                    <span class="version-label">Current version</span>
                    <span class="version-value">14.5 (23F79)</span>
                </div>
                <div class="version-row">
                    <span class="version-label">Available update</span>
                    <span class="version-value">15.1 (24B83)</span>
                </div>
                <div class="version-row">
                    <span class="version-label">Size</span>
                    <span class="version-value">3.42 GB</span>
                </div>
            </div>
            
            <div class="progress-section" id="progressSection" style="display: none;">
                <div class="progress-label">
                    <span>Downloading update...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            
            <div style="display: flex; align-items: center;">
                <button class="update-btn" id="updateBtn">Download & Install</button>
                <span style="color: #6b7280; font-size: 14px;">Later</span>
            </div>
            
            <div class="status-box" id="statusBox"></div>
        </div>
    </div>
    
    <div class="toast" id="toast">✅ Update will be finished soon!</div>
    
    <script>
        const updateBtn = document.getElementById('updateBtn');
        const progressSection = document.getElementById('progressSection');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const statusBox = document.getElementById('statusBox');
        const toast = document.getElementById('toast');
        
        updateBtn.addEventListener('click', startUpdate);
        
        function startUpdate() {
            updateBtn.disabled = true;
            updateBtn.textContent = 'Downloading...';
            
            progressSection.style.display = 'block';
            
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);

            let percent = 0;
            const interval = setInterval(() => {
                percent += 2;
                progressFill.style.width = percent + '%';
                progressPercent.textContent = percent + '%';
                
                if (percent >= 100) {
                    clearInterval(interval);
                    

                    setTimeout(() => {
                        progressSection.style.display = 'none';
                        statusBox.className = 'status-box failed';
                        statusBox.innerHTML = '<strong>❌ Update Failed</strong><p>Verification error: The update is not signed by Apple.</p>';
                        statusBox.style.display = 'block';
                        updateBtn.disabled = false;
                        updateBtn.textContent = 'Retry Download';
                    }, 3000);
                }
            }, 50);
        }
    </script>
</body>
</html>
