<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Login Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 50px; width: 100%; max-width: 420px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-icon { width: 70px; height: 70px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; margin: 0 auto 15px; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 30px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #555; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        .form-group input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px; 
            font-size: 15px;
            transition: border-color 0.2s;
        }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .login-btn { 
            width: 100%; 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); }
        
        .success-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(39, 174, 96, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
        }
        .success-overlay .checkmark { font-size: 80px; margin-bottom: 20px; }
        .success-overlay h2 { font-size: 28px; margin-bottom: 10px; }
        .success-overlay p { font-size: 16px; opacity: 0.9; }
        
        .login-status {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .login-status.error { background: #f8d7da; border: 2px solid #e74c3c; color: #721c24; }
        .login-status.success { background: #d4edda; border: 2px solid #27ae60; color: #155724; }

        .two-factor-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            z-index: 1001;
            width: 100%;
            max-width: 400px;
        }
        .two-factor-modal h3 { color: #2c3e50; text-align: center; margin-bottom: 20px; }
        .two-factor-modal p { color: #666; text-align: center; margin-bottom: 20px; font-size: 14px; }
        .otp-input { 
            width: 100%; 
            padding: 14px; 
            border: 2px solid #e0e0e0; 
            border-radius: 8px; 
            font-size: 18px; 
            text-align: center; 
            letter-spacing: 8px;
            margin-bottom: 20px;
        }
        .verify-btn { 
            width: 100%; 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white; 
            border: none; 
            padding: 14px; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🔐</div>
            <h1>Secure Login Portal</h1>
        </div>
        
        <form id="loginForm" onsubmit="return false;">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" value="admin">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" value="password123">
            </div>
            <button class="login-btn" onclick="attemptLogin()">Sign In</button>
        </form>
        
        <div class="login-status error" id="loginStatus">
            <strong>⚠️ Login Failed</strong>
            <p>Invalid credentials. Please check your username and password.</p>
        </div>
    </div>

    <div class="success-overlay" id="successOverlay">
        <div class="checkmark">✓</div>
        <h2>Login Successful!</h2>
        <p>Redirecting to dashboard...</p>
    </div>
    
    <div class="two-factor-modal" id="twoFactorModal">
        <h3>📱 Two-Factor Authentication</h3>
        <p>Enter the 6-digit code sent to your registered device.</p>
        <input type="text" class="otp-input" id="otpInput" placeholder="000000" maxlength="6">
        <button class="verify-btn" onclick="verifyOTP()">Verify</button>
    </div>
    
    <script>
        let loginAttempted = false;
        
        function attemptLogin() {
            loginAttempted = true;
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            document.getElementById('successOverlay').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('successOverlay').style.display = 'none';
            }, 2000);
            
            setTimeout(() => {
                document.getElementById('twoFactorModal').style.display = 'block';
            }, 3000);

            setTimeout(() => {
                document.getElementById('loginStatus').style.display = 'block';
            }, 5000);
        }
        
        function verifyOTP() {
            const otp = document.getElementById('otpInput').value;
            document.getElementById('twoFactorModal').style.display = 'none';
            
            if (otp === '123456') {
                document.getElementById('loginStatus').className = 'login-status success';
                document.getElementById('loginStatus').innerHTML = 
                    '<strong>✓ Login Complete</strong><p>Welcome back! You are now logged in.</p>';
            } else {
                document.getElementById('loginStatus').style.display = 'block';
            }
        }
    </script>
</body>
</html>
