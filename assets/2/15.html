<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f1f3f5; font-family: 'Inter', sans-serif; padding: 30px; }
        .cart-container { max-width: 800px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.15); overflow: hidden; }
        .header { background: #0b3954; color: white; padding: 30px; }
        .header h1 { font-size: 28px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .cart-items { padding: 25px; border-bottom: 1px solid #e9ecef; }
        .item-row { display: flex; align-items: center; padding: 20px 0; border-bottom: 1px solid #f1f3f5; }
        .item-row:last-child { border-bottom: none; }
        .item-image { width: 70px; height: 70px; background: #dee2e6; border-radius: 14px; margin-right: 20px; display: flex; align-items: center; justify-content: center; color: #495057; font-size: 24px; }
        .item-details { flex: 1; }
        .item-title { font-weight: 600; color: #212529; margin-bottom: 5px; }
        .item-price { color: #2b8c5e; font-weight: 700; }
        .item-quantity { display: flex; align-items: center; gap: 10px; }
        .qty-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid #ced4da; background: white; cursor: pointer; }
        .summary { background: #f8f9fa; padding: 25px; border-radius: 20px; margin: 20px; }
        .summary-row { display: flex; justify-content: space-between; padding: 10px 0; color: #495057; }
        .summary-total { font-size: 22px; font-weight: 700; color: #0b3954; padding-top: 15px; border-top: 2px dashed #ced4da; }
        .checkout-btn { background: #0b3954; color: white; border: none; padding: 18px; width: calc(100% - 40px); margin: 0 20px 25px; border-radius: 60px; font-size: 18px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .checkout-btn:hover { background: #082c40; }
        .checkout-btn:disabled { background: #adb5bd; cursor: not-allowed; }
        .order-status { margin: 0 20px 25px; padding: 20px; border-radius: 20px; display: none; }
        .order-status.processing { background: #fff3cd; border: 2px solid #ffc107; color: #856404; }
        .order-status.failed { background: #f8d7da; border: 2px solid #dc3545; color: #721c24; }
    </style>
</head>
<body>
    <div class="cart-container">
        <div class="header">
            <h1>🛒 Your Shopping Cart</h1>
        </div>
        
        <div class="cart-items">
            <div class="item-row">
                <div class="item-image">📱</div>
                <div class="item-details">
                    <div class="item-title">Wireless Headphones</div>
                    <div class="item-price">$59.99</div>
                </div>
                <div class="item-quantity">
                    <button class="qty-btn" onclick="changeQty(this, -1)">−</button>
                    <span id="qty1">1</span>
                    <button class="qty-btn" onclick="changeQty(this, 1)">+</button>
                </div>
            </div>
            <div class="item-row">
                <div class="item-image">⌚</div>
                <div class="item-details">
                    <div class="item-title">Smart Watch</div>
                    <div class="item-price">$129.99</div>
                </div>
                <div class="item-quantity">
                    <button class="qty-btn" onclick="changeQty(this, -1)">−</button>
                    <span id="qty2">1</span>
                    <button class="qty-btn" onclick="changeQty(this, 1)">+</button>
                </div>
            </div>
        </div>
        
        <div class="summary">
            <div class="summary-row"><span>Subtotal</span><span id="subtotal">$189.98</span></div>
            <div class="summary-row"><span>Shipping</span><span>$5.99</span></div>
            <div class="summary-row"><span>Tax (8%)</span><span id="tax">$15.20</span></div>
            <div class="summary-total" id="total">$211.17</div>
        </div>
        
        <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
        
        <div class="order-status" id="orderStatus"></div>
    </div>
    
    <script>
        let quantities = [1, 1];
        const prices = [59.99, 129.99];
        const subtotalSpan = document.getElementById('subtotal');
        const taxSpan = document.getElementById('tax');
        const totalSpan = document.getElementById('total');
        const checkoutBtn = document.getElementById('checkoutBtn');
        const orderStatus = document.getElementById('orderStatus');
        
        function updateTotals() {
            let subtotal = 0;
            quantities.forEach((qty, i) => {
                subtotal += qty * prices[i];
            });
            const tax = subtotal * 0.08;
            const total = subtotal + 5.99 + tax;
            subtotalSpan.textContent = `$${subtotal.toFixed(2)}`;
            taxSpan.textContent = `$${tax.toFixed(2)}`;
            totalSpan.textContent = `$${total.toFixed(2)}`;
        }
        
        function changeQty(btn, delta) {
            const row = btn.closest('.item-row');
            const qtySpan = row.querySelector('span[id^="qty"]');
            let index = qtySpan.id === 'qty1' ? 0 : 1;
            quantities[index] = Math.max(1, quantities[index] + delta);
            qtySpan.textContent = quantities[index];
            updateTotals();
        }
        
        checkoutBtn.addEventListener('click', placeOrder);
        
        function placeOrder() {
            checkoutBtn.disabled = true;
            checkoutBtn.textContent = 'Processing...';
            
            orderStatus.className = 'order-status processing';
            orderStatus.innerHTML = '<strong>⏳ Placing your order...</strong><p>Please do not refresh the page.</p>';
            orderStatus.style.display = 'block';
            
            setTimeout(() => {
                orderStatus.className = 'order-status failed';
                orderStatus.innerHTML = '<strong>❌ Order Failed</strong><p>Sorry, the item "Wireless Headphones" is out of stock.</p>';
                checkoutBtn.disabled = false;
                checkoutBtn.textContent = 'Try Again';
            }, 3000);
        }
    </script>
</body>
</html>
