<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>File Download Center</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f7fa; padding: 40px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 40px; }
        h1 { color: #2c3e50; margin-bottom: 30px; text-align: center; }
        .file-item { background: #f8f9fa; border: 2px solid #e9ecef; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .file-info { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .file-icon { width: 50px; height: 50px; background: #3498db; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; }
        .file-details h3 { color: #2c3e50; font-size: 16px; }
        .file-details p { color: #7f8c8d; font-size: 13px; }
        .download-btn { 
            background: #27ae60; 
            color: white; 
            border: none; 
            padding: 12px 30px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 14px;
            font-weight: 600;
            width: 100%;
        }
        .download-btn:hover { background: #219a52; }
        .download-btn:disabled { background: #95a5a6; cursor: not-allowed; }
        
        .error-status {
            display: none;
            background: #f8d7da;
            border: 2px solid #e74c3c;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }
        .error-status.show { display: block; }
        .error-status h4 { color: #e74c3c; margin-bottom: 10px; }
        .error-status p { color: #721c24; font-size: 14px; }
        .retry-indicator { 
            display: none; 
            margin-top: 15px; 
            color: #e74c3c; 
            font-size: 13px;
        }
        .retry-indicator.show { display: block; }
        
        .success-status {
            display: none;
            background: #d4edda;
            border: 2px solid #27ae60;
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
        }
        .success-status.show { display: block; }
        .success-status h4 { color: #27ae60; margin-bottom: 10px; }
        .success-status p { color: #155724; font-size: 14px; }
        
        .progress-container {
            display: none;
            margin-top: 20px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text {
            text-align: center;
            margin-top: 8px;
            color: #555;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📥 File Download Center</h1>
        
        <div class="file-item">
            <div class="file-info">
                <div class="file-icon">📄</div>
                <div class="file-details">
                    <h3>quarterly_report_2026.pdf</h3>
                    <p>3.2 MB • PDF Document</p>
                </div>
            </div>
            <button class="download-btn" id="downloadBtn" onclick="startDownload()">⬇️ Download Now</button>
        </div>
        
        <div class="error-status" id="errorStatus">
            <h4>⚠️ Download Failed</h4>
            <p>No network connection. Unable to reach the server.</p>
            <div class="retry-indicator" id="retryIndicator">
                🔄 Retrying... (Attempt <span id="attemptNum">1</span>/5)
            </div>
        </div>
        
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Connecting...</div>
        </div>
        
        <div class="success-status" id="successStatus">
            <h4>✓ Download Complete!</h4>
            <p>File saved to: /home/user/downloads/quarterly_report_2026.pdf</p>
        </div>
    </div>
    
    <script>
        let downloadStarted = false;
        
        function startDownload() {
            if (downloadStarted) return;
            downloadStarted = true;
            
            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            btn.textContent = 'Downloading...';
            
            setTimeout(() => {
                document.getElementById('errorStatus').classList.add('show');
                document.getElementById('retryIndicator').classList.add('show');
            }, 800);
            
            let attempt = 1;
            const retryInterval = setInterval(() => {
                attempt++;
                document.getElementById('attemptNum').textContent = attempt;
                
                if (attempt >= 3) {
                    clearInterval(retryInterval);
                }
            }, 1500);
            
            setTimeout(() => {
                document.getElementById('errorStatus').classList.remove('show');
                document.getElementById('progressContainer').style.display = 'block';
                
                let progress = 0;
                const progressInterval = setInterval(() => {
                    progress += Math.random() * 15 + 5;
                    if (progress >= 100) {
                        progress = 100;
                        clearInterval(progressInterval);
                        
                        setTimeout(() => {
                            document.getElementById('progressContainer').style.display = 'none';
                            document.getElementById('successStatus').classList.add('show');
                            btn.textContent = 'Download Complete';
                        }, 500);
                    }
                    document.getElementById('progressFill').style.width = progress + '%';
                    document.getElementById('progressText').textContent = 'Downloading... ' + Math.round(progress) + '%';
                }, 200);
            }, 5000);
        }
    </script>
</body>
</html>
