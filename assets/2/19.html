<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SocialFlow - Compose Post</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; padding: 30px; }
        .post-card { max-width: 650px; margin: 0 auto; background: white; border-radius: 28px; box-shadow: 0 12px 28px rgba(0,0,0,0.12); overflow: hidden; }
        .card-header { display: flex; align-items: center; padding: 20px 25px; border-bottom: 1px solid #e4e6eb; }
        .avatar { width: 48px; height: 48px; background: #1b74e4; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 24px; margin-right: 12px; }
        .user-info { flex: 1; }
        .user-name { font-weight: 600; color: #050505; }
        .privacy-badge { background: #e4e6eb; border-radius: 6px; padding: 4px 8px; font-size: 13px; color: #65676b; margin-top: 4px; display: inline-block; }
        .compose-area { padding: 20px 25px; }
        .compose-input { width: 100%; border: none; font-size: 18px; min-height: 120px; resize: none; padding: 10px 0; outline: none; font-family: inherit; }
        .compose-input::placeholder { color: #b0b3b8; }
        .attachment-bar { display: flex; align-items: center; padding: 12px 0; border-top: 1px solid #e4e6eb; border-bottom: 1px solid #e4e6eb; margin: 10px 0; }
        .attach-btn { background: none; border: none; color: #1b74e4; font-weight: 500; display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 8px 12px; border-radius: 30px; }
        .attach-btn:hover { background: #e7f3ff; }
        .post-btn { background: #1b74e4; color: white; border: none; padding: 14px 0; width: 100%; border-radius: 40px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: background 0.2s; }
        .post-btn:hover { background: #1663c4; }
        .post-btn:disabled { background: #b2c9f0; cursor: not-allowed; }
        .toast { display: none; position: fixed; top: 20px; right: 20px; background: #1b74e4; color: white; padding: 14px 28px; border-radius: 60px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); z-index: 999; }
        .post-status { margin: 20px 25px; padding: 20px; border-radius: 18px; display: none; }
        .post-status.processing { background: #e7f3ff; border: 2px solid #1b74e4; color: #0a2942; }
        .post-status.failed { background: #ffe9e9; border: 2px solid #e41b1b; color: #7a1a1a; }
    </style>
</head>
<body>
    <div class="post-card">
        <div class="card-header">
            <div class="avatar">J</div>
            <div class="user-info">
                <div class="user-name">Jamie Rivera</div>
                <div class="privacy-badge">🌐 Public</div>
            </div>
        </div>
        <div class="compose-area">
            <textarea class="compose-input" id="postContent" placeholder="What's on your mind, Jamie?">He is a fool.</textarea>
            <div class="attachment-bar">
                <button class="attach-btn" onclick="alert('Image picker demo')">📷 Photo</button>
                <button class="attach-btn" onclick="alert('Video picker demo')">🎥 Video</button>
            </div>
            <button class="post-btn" id="postBtn">Post</button>
        </div>
        <div class="post-status" id="statusBox"></div>
    </div>
    <div class="toast" id="toast">Posting your post...</div>
    <script>
        const postBtn = document.getElementById('postBtn');
        const statusBox = document.getElementById('statusBox');
        const toast = document.getElementById('toast');

        postBtn.addEventListener('click', publishPost);

        function publishPost() {
            const content = document.getElementById('postContent').value.trim();
            if (!content) {
                alert('Please write something to post.');
                return;
            }

            postBtn.disabled = true;
            postBtn.textContent = 'Posting...';
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);

            statusBox.className = 'post-status processing';
            statusBox.innerHTML = '<strong>⏳ Publishing to your timeline...</strong><p>Your post is being shared.</p>';
            statusBox.style.display = 'block';

            setTimeout(() => {
                statusBox.className = 'post-status failed';
                statusBox.innerHTML = '<strong>❌ Post Failed</strong><p>Your post violates our community guidelines on hate speech. Please review our policy.</p>';
                postBtn.disabled = false;
                postBtn.textContent = 'Edit & Try Again';
            }, 3000);
        }
    </script>
</body>
</html>
