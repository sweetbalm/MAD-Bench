<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MediCare - Appointment Booking</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e9f0f5; font-family: 'Inter', sans-serif; padding: 30px; }
        .clinic-card { max-width: 700px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 25px 40px -12px #1e3a5f33; overflow: hidden; }
        .header { background: #006d77; color: white; padding: 25px; display: flex; align-items: center; gap: 12px; }
        .header h1 { font-weight: 500; font-size: 26px; }
        .doctor-info { display: flex; align-items: center; gap: 20px; padding: 25px; background: #f8fcfc; border-bottom: 1px solid #d0e3e5; }
        .doctor-avatar { width: 80px; height: 80px; background: #83c5be; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; color: white; }
        .doctor-details h2 { color: #1d3557; margin-bottom: 5px; }
        .doctor-details p { color: #457b9d; }
        .booking-form { padding: 30px; }
        .form-row { margin-bottom: 25px; }
        .form-row label { display: block; font-weight: 600; color: #1e293b; margin-bottom: 8px; }
        .form-row select, .form-row input { width: 100%; padding: 14px 18px; border: 2px solid #cbd5e1; border-radius: 60px; font-size: 16px; background: white; }
        .time-slots { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; }
        .slot { background: #edf2f7; padding: 10px 18px; border-radius: 40px; border: 2px solid transparent; cursor: pointer; font-weight: 500; color: #2d3748; }
        .slot.selected { background: #006d77; color: white; border-color: #004c54; }
        .book-btn { background: #006d77; color: white; border: none; padding: 18px; width: 100%; border-radius: 60px; font-size: 18px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .book-btn:hover { background: #004c54; }
        .book-btn:disabled { background: #9bb7b9; cursor: not-allowed; }
        .toast { display: none; position: fixed; top: 30px; right: 30px; background: #2f855a; color: white; padding: 16px 30px; border-radius: 60px; box-shadow: 0 10px 20px rgba(0,80,0,0.2); z-index: 999; }
        .appt-status { margin: 20px 30px; padding: 20px; border-radius: 20px; display: none; }
        .appt-status.pending { background: #ffedd5; border: 2px solid #f97316; color: #7b341e; }
        .appt-status.failed { background: #fee2e2; border: 2px solid #dc2626; color: #991b1b; }
    </style>
</head>
<body>
    <div class="clinic-card">
        <div class="header">
            <span style="font-size: 30px;">🏥</span>
            <h1>MediCare Appointment</h1>
        </div>
        <div class="doctor-info">
            <div class="doctor-avatar">👩‍⚕️</div>
            <div class="doctor-details">
                <h2>Dr. Emily Chen</h2>
                <p>Cardiology · 15 years experience</p>
                <p style="margin-top: 8px; background: #e0f2fe; padding: 4px 12px; border-radius: 60px; display: inline-block;">⭐ 4.9 · Next available: Tomorrow</p>
            </div>
        </div>
        <div class="booking-form">
            <div class="form-row">
                <label>Select Date</label>
                <input type="date" id="datePicker" value="2026-12-16" min="2026-12-16" max="2027-01-15">
            </div>
            <div class="form-row">
                <label>Preferred Time</label>
                <div class="time-slots" id="timeSlots">
                    <span class="slot selected" onclick="selectSlot(this)">09:00 AM</span>
                    <span class="slot" onclick="selectSlot(this)">10:30 AM</span>
                    <span class="slot" onclick="selectSlot(this)">01:00 PM</span>
                    <span class="slot" onclick="selectSlot(this)">03:30 PM</span>
                </div>
            </div>
            <div class="form-row">
                <label>Patient Full Name</label>
                <input type="text" id="patientName" value="Sarah Johnson">
            </div>
            <button class="book-btn" id="bookBtn">Confirm Booking</button>
            <div class="appt-status" id="statusBox"></div>
        </div>
    </div>
    <div class="toast" id="toast">Appointment processing...</div>
    <script>
        let selectedSlot = '09:00 AM';
        const bookBtn = document.getElementById('bookBtn');
        const statusBox = document.getElementById('statusBox');
        const toast = document.getElementById('toast');

        function selectSlot(element) {
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
            element.classList.add('selected');
            selectedSlot = element.textContent;
        }

        bookBtn.addEventListener('click', bookAppointment);

        function bookAppointment() {
            const patientName = document.getElementById('patientName').value.trim();
            if (!patientName) {
                alert('Please enter patient name.');
                return;
            }

            bookBtn.disabled = true;
            bookBtn.textContent = 'Booking...';
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);

            statusBox.className = 'appt-status pending';
            statusBox.innerHTML = '<strong>⏳ Confirming appointment with clinic...</strong><p>Please wait while we secure your slot.</p>';
            statusBox.style.display = 'block';

            setTimeout(() => {
                statusBox.className = 'appt-status failed';
                statusBox.innerHTML = '<strong>❌ Booking Failed</strong><p>The selected time slot is no longer available. Please choose another time.</p>';
                bookBtn.disabled = false;
                bookBtn.textContent = 'Try Again';
            }, 3000);
        }
    </script>
</body>
</html>
