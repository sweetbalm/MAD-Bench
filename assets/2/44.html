<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Shield - Virus Scan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0b1c2f; font-family: 'Segoe UI', system-ui; padding: 30px; color: #e0e0e0; }
        .scan-card { max-width: 600px; margin: 0 auto; background: #1e2a3a; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); overflow: hidden; }
        .scan-header { background: #0f1a24; padding: 20px; display: flex; align-items: center; gap: 12px; border-bottom: 2px solid #00bcd4; }
        .scan-header h1 { font-size: 22px; color: #00bcd4; }
        .stats { padding: 20px; display: flex; justify-content: space-around; background: #1e2a3a; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 32px; font-weight: 700; color: #00bcd4; }
        .stat-label { color: #8a9aa8; }
        .progress-area { padding: 0 20px 20px; }
        .progress-bar-bg { height: 12px; background: #2d3f4f; border-radius: 30px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00bcd4, #4caf50); transition: width 0.3s; }
        .scan-btn { background: #00bcd4; color: #0f1a24; border: none; padding: 16px; width: calc(100% - 40px); margin: 0 20px 20px; border-radius: 60px; font-weight: 700; font-size: 18px; cursor: pointer; }
        .scan-btn:hover { background: #00acc1; }
        .scan-btn:disabled { background: #4f5b66; cursor: not-allowed; }
        .status-box { padding: 20px; background: #15232e; border-radius: 16px; margin: 0 20px 20px; }
        .status-box .title { font-weight: 600; margin-bottom: 10px; }
        .threat-list { list-style: none; }
        .threat-list li { padding: 8px; border-bottom: 1px solid #2d3f4f; display: flex; align-items: center; gap: 10px; }
        .threat-list .clean { color: #4caf50; }
        .threat-list .infected { color: #f44336; }
        .toast { display: none; position: fixed; top: 20px; right: 20px; background: #4caf50; color: white; padding: 15px 25px; border-radius: 60px; z-index: 999; }
    </style>
</head>
<body>
    <div class="scan-card">
        <div class="scan-header">
            <span style="font-size: 28px;">🛡️</span>
            <h1>Security Shield - Full Scan</h1>
        </div>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="filesScanned">0</div>
                <div class="stat-label">Files Scanned</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="threatsDetected">0</div>
                <div class="stat-label">Threats</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="cleaned">0</div>
                <div class="stat-label">Cleaned</div>
            </div>
        </div>
        <div class="progress-area">
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
        <button class="scan-btn" id="scanBtn">Start Full Scan</button>
        <div class="status-box" id="statusBox">
            <div class="title">Scan Results</div>
            <ul class="threat-list" id="threatList">
                <li><span class="clean">✓</span> system32.dll - Clean</li>
                <li><span class="clean">✓</span> userdata.dat - Clean</li>
            </ul>
        </div>
    </div>
    <div class="toast" id="toast">✅ Scan completed - All threats neutralized!</div>

    <script>
        const scanBtn = document.getElementById('scanBtn');
        const progressFill = document.getElementById('progressFill');
        const filesScanned = document.getElementById('filesScanned');
        const threatsDetected = document.getElementById('threatsDetected');
        const cleaned = document.getElementById('cleaned');
        const threatList = document.getElementById('threatList');
        const toast = document.getElementById('toast');
        let scanInterval;

        scanBtn.addEventListener('click', startScan);

        function startScan() {
            scanBtn.disabled = true;
            scanBtn.textContent = 'Scanning...';
            
            let scanned = 0;
            let detected = 0;
            let cleanedCount = 0;
            filesScanned.textContent = scanned;
            threatsDetected.textContent = detected;
            cleaned.textContent = cleanedCount;
            threatList.innerHTML = '';
            let progress = 0;
            scanInterval = setInterval(() => {
                progress += 2;
                progressFill.style.width = progress + '%';
                scanned = Math.floor(progress * 10);
                filesScanned.textContent = scanned;

                if (progress >= 30 && progress < 70) {
                    if (!document.querySelector('.infected')) {
                        const li = document.createElement('li');
                        li.innerHTML = '<span class="infected">⚠️</span> malware.exe - Infection detected, removal failed (access denied)';
                        threatList.appendChild(li);
                        detected = 1;
                        threatsDetected.textContent = detected;
                    }
                }

                if (progress >= 70) {
                    if (detected === 1 && cleanedCount === 0) {
                        threatList.innerHTML = ''; 
                        const li = document.createElement('li');
                        li.innerHTML = '<span class="clean">✓</span> malware.exe - Successfully cleaned';
                        threatList.appendChild(li);
                        cleanedCount = 1;
                        cleaned.textContent = cleanedCount;
                    }
                }

                if (progress >= 100) {
                    clearInterval(scanInterval);
                    scanBtn.disabled = false;
                    scanBtn.textContent = 'Start Full Scan';

                    toast.style.display = 'block';
                    setTimeout(() => { toast.style.display = 'none'; }, 2000);
                }
            }, 100);
        }
    </script>
</body>
</html>
