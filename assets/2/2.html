<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Report Q2 · download demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f6f9fc 0%, #edf2f7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 1.5rem;
            margin: 0;
        }

        .card {
            max-width: 520px;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            background-color: #ffffffdd;
            border-radius: 36px;
            box-shadow: 0 20px 40px -12px rgba(0,20,40,0.35), 0 4px 18px rgba(0,0,0,0.05);
            padding: 2.5rem 2rem 2.8rem;
            border: 1px solid #ffffffaa;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.01);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #0a2a3b;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 0.5rem;
        }

        h1 span {
            background: #1f4a6e;
            color: white;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            letter-spacing: 0.3px;
            vertical-align: middle;
            margin-left: 8px;
        }

        .sub {
            font-size: 1.05rem;
            color: #2d4b63;
            margin-bottom: 2rem;
            border-left: 4px solid #3080b0;
            padding-left: 1rem;
            background: #e6f0f8;
            border-radius: 0 12px 12px 0;
            line-height: 1.4;
            width: fit-content;
            padding: 0.6rem 1.2rem;
        }

        .report-preview {
            background: #ffffffd6;
            border-radius: 26px;
            padding: 1.5rem 1.2rem;
            margin: 1.8rem 0 2.2rem;
            border: 1px solid #cbd6e4;
            box-shadow: inset 0 2px 6px #00000008, 0 8px 12px -12px #1f3b4f;
        }

        .meta-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            color: #1e3b4f;
        }

        .file-badge {
            background: #d9e7f2;
            border-radius: 40px;
            padding: 0.3rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .file-badge:before {
            content: "📄";
            font-size: 1.1rem;
        }

        .file-size {
            color: #4d6377;
            font-size: 0.9rem;
            font-weight: 450;
        }

        .description {
            color: #1d3c53;
            font-size: 1rem;
            margin: 1rem 0 0.2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .description .date {
            background: #eef3f7;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
        }

        hr {
            border: none;
            border-top: 2px dashed #b7cfde;
            margin: 1rem 0;
        }

        .download-area {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.8rem;
            margin-top: 1.8rem;
        }

        .btn-download {
            background: #0f3b54;
            color: white;
            border: none;
            padding: 1rem 2.8rem;
            font-size: 1.3rem;
            font-weight: 520;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 8px 18px -6px #0a2a3b80, 0 0 0 1px #15455f inset;
            transition: background 0.15s, transform 0.1s, box-shadow 0.2s;
            width: 100%;
            letter-spacing: 0.3px;
        }

        .btn-download:hover {
            background: #124d6b;
            box-shadow: 0 12px 24px -10px #0f3b54, 0 0 0 1px #267394 inset;
            transform: scale(1.02);
        }

        .btn-download:active {
            transform: scale(0.98);
            background: #083145;
            box-shadow: 0 4px 12px -4px #0f2c3b;
        }

        .btn-download:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            background: #6d8da0;
            box-shadow: none;
            transform: none;
        }

        .spinner {
            display: inline-block;
            width: 1.2rem;
            height: 1.2rem;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message-banner {
            margin-top: 1.5rem;
            width: 100%;
            padding: 0.9rem 1.2rem;
            border-radius: 60px;
            background: #ecf3f8;
            color: #0d3449;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #c2d8e9;
            box-shadow: 0 2px 6px #b7c9d6;
            transition: all 0.2s ease;
        }

        .message-banner .status-icon {
            font-size: 1.5rem;
        }

        .message-banner .message-text {
            font-size: 1rem;
            line-height: 1.4;
        }

        .message-banner.warning {
            background: #ffefdb;
            border-color: #ebb776;
            color: #6d4100;
        }

        .message-banner.warning .status-icon {
            color: #c97d0b;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>
        Sales Report Q2
    </h1>

    <div class="report-preview">
        <div class="meta-row">
            <span class="file-badge">Sales Report Q2</span>
            <span class="file-size">4.8 MB (PDF)</span>
        </div>
        <div class="description">
            <span>📊 Include all the charts and tables.</span>
            <span class="date">🗓️ 2025-06-30</span>
        </div>
        <hr>
    </div>

    <div class="download-area">
        <button class="btn-download" id="downloadBtn">
            <span>Download</span>
            <span id="buttonIcon">⬇️</span>
        </button>
    </div>

    <div id="messageBox" class="message-banner" style="min-height: 68px; display: flex;">
        <span class="status-icon" id="msgIcon">ℹ️</span>
        <span class="message-text" id="msgText">Ready, click the button to start downloading.</span>
    </div>
</div>

<script>
    (function() {
        const downloadBtn = document.getElementById('downloadBtn');
        const buttonIcon = document.getElementById('buttonIcon');
        const msgIcon = document.getElementById('msgIcon');
        const msgText = document.getElementById('msgText');
        const messageBox = document.getElementById('messageBox');

        let failTimer = null;
        let isDownloading = false;

        function resetToIdle() {
            if (failTimer) {
                clearTimeout(failTimer);
                failTimer = null;
            }
            isDownloading = false;
            downloadBtn.disabled = false;
            buttonIcon.innerHTML = '⬇️';
            messageBox.classList.remove('warning');
            msgIcon.innerText = 'ℹ️';
            msgText.innerText = 'Ready, click the button to start downloading.';
        }

        function enterDownloadingState() {
            isDownloading = true;
            downloadBtn.disabled = true;
            buttonIcon.innerHTML = '<span class="spinner"></span>';

            messageBox.classList.remove('warning');
            msgIcon.innerText = '⏳';
            msgText.innerText = 'Download started... Fetching data.';
        }

        function enterFailedState() {
            if (!isDownloading) return;

            if (failTimer) {
                clearTimeout(failTimer);
                failTimer = null;
            }

            isDownloading = false;
            downloadBtn.disabled = false;
            buttonIcon.innerHTML = '⬇️';

            messageBox.classList.add('warning');
            msgIcon.innerText = '⚠️';
            msgText.innerText = 'Network interrupted, download failed.';
        }

        function handleDownload() {
            if (isDownloading) return;

            if (failTimer) {
                clearTimeout(failTimer);
                failTimer = null;
            }

            enterDownloadingState();

            failTimer = setTimeout(() => {
                enterFailedState();
                failTimer = null;
            }, 2000);
        }

        downloadBtn.addEventListener('click', handleDownload);

        window.addEventListener('beforeunload', function() {
            if (failTimer) {
                clearTimeout(failTimer);
                failTimer = null;
            }
        });
    })();
</script>
</body>
</html>
