<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Journal Submission System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f7fa; font-family: 'Times New Roman', serif; padding: 30px; position: relative; }
        .journal-card { max-width: 800px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); position: relative; z-index: 1; }
        .header { background: #1a2b3c; color: white; padding: 25px; border-radius: 16px 16px 0 0; }
        .header h1 { font-size: 24px; font-weight: 400; }
        .sub-header { background: #f0f3f7; padding: 15px 25px; border-bottom: 2px solid #cbd5e1; }
        .paper-info { padding: 25px; }
        .info-row { margin-bottom: 20px; }
        .info-row label { font-weight: 600; color: #334155; display: block; margin-bottom: 5px; }
        .info-row input, .info-row textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-family: inherit; }
        .info-row textarea { min-height: 100px; }
        .file-upload { border: 2px dashed #94a3b8; padding: 30px; text-align: center; border-radius: 12px; background: #f8fafc; margin: 20px 0; }
        .submit-btn { background: #1a2b3c; color: white; border: none; padding: 15px 40px; border-radius: 40px; font-size: 18px; cursor: pointer; margin: 20px 0; }
        .submit-btn:hover { background: #0f1a24; }

        .floating-ad {
            position: fixed;
            bottom: 200px;
            right: 700px;
            width: 280px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            z-index: 1000;
            pointer-events: auto;
            animation: slideInRight 0.5s ease;
            cursor: pointer;
        }
        .floating-ad .title { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .floating-ad .subtitle { font-size: 14px; margin-bottom: 15px; opacity: 0.9; }
        .floating-ad .subscribe-btn { background: white; color: #667eea; border: none; padding: 8px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; }
        .floating-ad .close-ad {
            position: absolute;
            top: 8px;
            right: 12px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            opacity: 0.8;
        }
        .floating-ad .close-ad:hover { opacity: 1; }
        
        .status-area { margin: 20px 0; padding: 20px; border-radius: 12px; display: none; }
        .status-area.processing { background: #fff3cd; border: 2px solid #fbbf24; }
        .status-area.failed { background: #fee2e2; border: 2px solid #dc2626; }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="journal-card">
        <div class="header">
            <h1>📄 Journal of Artificial Intelligence Research</h1>
        </div>
        <div class="sub-header">
            <span>Manuscript Submission System</span>
        </div>
        <div class="paper-info">
            <div class="info-row">
                <label>Paper Title</label>
                <input type="text" value="Deep Learning Approaches for Protein Folding" readonly>
            </div>
            <div class="info-row">
                <label>Authors</label>
                <input type="text" value="J. Smith, A. Johnson, M. Lee" readonly>
            </div>
            <div class="info-row">
                <label>Abstract</label>
                <textarea readonly>We present a novel deep learning architecture for predicting protein folding patterns...</textarea>
            </div>
            <div class="file-upload">
                <span style="font-size: 24px;">📁</span>
                <p style="color: #475569;">manuscript_final.zip (2.4 MB) uploaded</p>
            </div>
            
            <div style="text-align: center; position: relative;">
                <button class="submit-btn" id="submitBtn" onclick="submitPaper()">Submit to Journal</button>
                <p style="color: #64748b; font-size: 14px; margin-top: 10px;">By submitting you agree to our terms</p>
            </div>
            
            <div class="status-area" id="statusArea"></div>
        </div>
    </div>

    <div class="floating-ad" id="floatingAd">
        <span class="close-ad" onclick="this.parentElement.style.display='none'">×</span>
        <div class="title">📚 Subscribe to JAIR</div>
        <div class="subtitle">Get the latest research delivered to your inbox</div>
        <button class="subscribe-btn">Subscribe Now</button>
        <p style="font-size: 11px; margin-top: 12px; opacity: 0.7;">Ad · Quarterly newsletter</p>
    </div>

    <script>
        function submitPaper() {
            const ad = document.getElementById('floatingAd');
            if (ad.style.display !== 'none' && ad.offsetParent !== null) {
                const btnRect = document.getElementById('submitBtn').getBoundingClientRect();
                const adRect = ad.getBoundingClientRect();

                if (btnRect.right > adRect.left && btnRect.bottom > adRect.top) {
                    alert('⚠️ Cannot submit: A subscription prompt is covering the submit button. Please close it first.');
                    return;
                }
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            const statusArea = document.getElementById('statusArea');
            statusArea.className = 'status-area processing';
            statusArea.innerHTML = '<strong>⏳ Submitting to journal...</strong><p>Your manuscript is being processed.</p>';
            statusArea.style.display = 'block';

            setTimeout(() => {
                statusArea.className = 'status-area failed';
                statusArea.innerHTML = '<strong>❌ Submission Failed</strong><p>Format check failed: Figures must be in EPS or PDF format.</p>';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Revise and Resubmit';
            }, 3000);
        }
    </script>
</body>
</html>
