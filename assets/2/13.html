<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Gateway</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, system-ui, sans-serif; background: #f3f4f6; padding: 30px; }
        .card { max-width: 500px; margin: 0 auto; background: white; border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); overflow: hidden; }
        .card-header { background: #0a0f1c; color: white; padding: 30px; text-align: center; }
        .card-header h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
        .card-header p { color: #9ca3af; font-size: 14px; }
        .card-body { padding: 30px; }
        .amount-box { background: #f9fafb; border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 25px; }
        .amount-label { color: #6b7280; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        .amount-value { font-size: 48px; font-weight: 700; color: #0a0f1c; margin-top: 5px; }
        .amount-value small { font-size: 24px; font-weight: 400; color: #6b7280; }
        .payment-method { border: 2px solid #e5e7eb; border-radius: 18px; padding: 15px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; transition: border-color 0.2s; }
        .payment-method.selected { border-color: #2563eb; background: #f0f5ff; }
        .payment-method input[type="radio"] { width: 20px; height: 20px; accent-color: #2563eb; }
        .payment-method label { font-weight: 500; color: #1f2937; flex: 1; }
        .payment-method .card-icon { font-size: 24px; }
        .pay-btn { background: #2563eb; color: white; border: none; padding: 18px; width: 100%; border-radius: 40px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 20px; transition: background 0.2s; }
        .pay-btn:hover { background: #1d4ed8; }
        .pay-btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .toast-success { display: none; position: fixed; top: 20px; right: 20px; background: #059669; color: white; padding: 16px 24px; border-radius: 100px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); z-index: 999; }
        .status-area { margin-top: 20px; padding: 20px; border-radius: 16px; display: none; }
        .status-area.processing { background: #fff3cd; border: 2px solid #fbbf24; color: #92400e; }
        .status-area.failed { background: #fee2e2; border: 2px solid #ef4444; color: #991b1b; }
        .status-area.success { background: #d1fae5; border: 2px solid #10b981; color: #065f46; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">
            <h1>💳 Secure Payment</h1>
            <p>Complete your purchase</p>
        </div>
        <div class="card-body">
            <div class="amount-box">
                <div class="amount-label">Total Amount</div>
                <div class="amount-value">$129.99 <small>USD</small></div>
            </div>
            
            <div style="margin-bottom: 15px; color: #374151; font-weight: 500;">Select payment method</div>
            
            <div class="payment-method selected">
                <input type="radio" name="payment" id="card" checked>
                <label for="card">Credit / Debit Card</label>
                <span class="card-icon">💳</span>
            </div>
            
            <div class="payment-method">
                <input type="radio" name="payment" id="paypal">
                <label for="paypal">PayPal</label>
                <span class="card-icon">🅿️</span>
            </div>
            
            <div class="payment-method">
                <input type="radio" name="payment" id="apple">
                <label for="apple">Apple Pay</label>
                <span class="card-icon">🍎</span>
            </div>
            
            <button class="pay-btn" id="payBtn">Pay $129.99</button>
            
            <div class="status-area" id="statusArea"></div>
        </div>
    </div>
    
    <div class="toast-success" id="toastSuccess">✅ Payment confirmed! Thank you.</div>
    
    <script>
        const payBtn = document.getElementById('payBtn');
        const statusArea = document.getElementById('statusArea');
        const toast = document.getElementById('toastSuccess');
        
        payBtn.addEventListener('click', processPayment);
        
        function processPayment() {
            payBtn.disabled = true;
            payBtn.textContent = 'Processing...';
            
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 2000);
            
            statusArea.className = 'status-area processing';
            statusArea.innerHTML = '<strong>⏳ Processing payment...</strong><p>Please wait while we confirm your payment.</p>';
            statusArea.style.display = 'block';

            setTimeout(() => {
                statusArea.className = 'status-area failed';
                statusArea.innerHTML = '<strong>❌ Payment Failed</strong><p>Your bank declined the transaction. Insufficient funds.</p>';
                payBtn.disabled = false;
                payBtn.textContent = 'Try Again';
            }, 3000);
        }
    </script>
</body>
</html>
