<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Payment Gateway</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f8fafc; font-family: 'Inter', sans-serif; padding: 30px; position: relative; min-height: 100vh; }
        .payment-card { max-width: 500px; margin: 0 auto; background: white; border-radius: 32px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); position: relative; z-index: 1; }
        .card-header { background: #0f172a; color: white; padding: 30px; border-radius: 32px 32px 0 0; }
        .card-header h1 { font-size: 24px; display: flex; align-items: center; gap: 10px; }
        .card-body { padding: 30px; }
        .amount-display { background: #f1f5f9; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 30px; }
        .amount-display .label { color: #475569; font-size: 14px; }
        .amount-display .value { font-size: 48px; font-weight: 700; color: #0f172a; }
        .card-details { margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: 500; color: #334155; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 14px 18px; border: 2px solid #e2e8f0; border-radius: 16px; font-size: 16px; }
        .pay-now-btn { background: #0f172a; color: white; border: none; padding: 18px; width: 100%; border-radius: 40px; font-size: 18px; font-weight: 600; cursor: pointer; margin-top: 20px; position: relative; z-index: 5; }
        .pay-now-btn:hover { background: #1e293b; }
        .pay-now-btn:disabled { background: #94a3b8; cursor: not-allowed; }

        .modal-ad {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            pointer-events: auto;
        }
        .modal-content {
            background: white;
            max-width: 400px;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }
        .modal-content h2 { color: #dc2626; margin: 15px 0; }
        .modal-content .offer { font-size: 36px; font-weight: 700; color: #059669; margin: 10px 0; }
        .modal-content button { background: #dc2626; color: white; border: none; padding: 12px 30px; border-radius: 40px; font-weight: 600; margin: 10px; cursor: pointer; }
        .modal-content .close-btn { background: #64748b; }
        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .status-box { margin-top: 20px; padding: 20px; border-radius: 16px; display: none; }
        .status-box.processing { background: #fff3cd; border: 2px solid #fbbf24; }
        .status-box.failed { background: #fee2e2; border: 2px solid #dc2626; color: #991b1b; }
    </style>
</head>
<body>
    <div class="modal-ad" id="adModal">
        <div class="modal-content">
            <span style="font-size: 50px;">🎉</span>
            <h2>SPECIAL OFFER!</h2>
            <p>Get 20% cashback on your first payment</p>
            <div class="offer">20% CASHBACK</div>
            <button onclick="document.getElementById('adModal').style.display='none'">Claim Now</button>
            <button class="close-btn" onclick="document.getElementById('adModal').style.display='none'">Close</button>
            <p style="font-size: 12px; color: #94a3b8; margin-top: 15px;">*Advertisement</p>
        </div>
    </div>

    <div class="payment-card">
        <div class="card-header">
            <h1>💳 Secure Payment</h1>
        </div>
        <div class="card-body">
            <div class="amount-display">
                <div class="label">Total Amount</div>
                <div class="value">$249.99</div>
            </div>
            <div class="card-details">
                <div class="input-group">
                    <label>Card Number</label>
                    <input type="text" placeholder="1234 5678 9012 3456" value="4111 1111 1111 1111">
                </div>
                <div style="display: flex; gap: 15px;">
                    <div class="input-group" style="flex: 1;">
                        <label>Expiry</label>
                        <input type="text" placeholder="MM/YY" value="12/25">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>CVV</label>
                        <input type="text" placeholder="123" value="123">
                    </div>
                </div>
            </div>
            <button class="pay-now-btn" id="payBtn" onclick="processPayment()">Pay $249.99</button>
            <div class="status-box" id="statusArea"></div>
        </div>
    </div>

    <script>
        function processPayment() {
            const adModal = document.getElementById('adModal');
            if (adModal.style.display !== 'none' && adModal.style.display !== 'none') {
                alert('⚠️ Please close the promotion modal before proceeding with payment.');
                return;
            }

            const payBtn = document.getElementById('payBtn');
            payBtn.disabled = true;
            payBtn.textContent = 'Processing...';

            const statusArea = document.getElementById('statusArea');
            statusArea.className = 'status-box processing';
            statusArea.innerHTML = '<strong>⏳ Processing payment...</strong><p>Please wait while we verify your card.</p>';
            statusArea.style.display = 'block';

            setTimeout(() => {
                statusArea.className = 'status-box failed';
                statusArea.innerHTML = '<strong>❌ Payment Failed</strong><p>Your bank declined the transaction. Please contact your bank.</p>';
                payBtn.disabled = false;
                payBtn.textContent = 'Try Again';
            }, 3000);
        }
    </script>
</body>
</html>
