<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Panel</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #333333;
            --card-bg: #f5f5f5;
            --toggle-bg: #ccc;
            --toggle-active: #28a745;
        }
        [data-theme="dark"] {
            --bg-color: #1a1a2e;
            --text-color: #eeeeee;
            --card-bg: #16213e;
            --toggle-bg: #555;
        }
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background: var(--bg-color);
            color: var(--text-color);
            transition: all 0.3s ease;
        }
        .settings-container {
            max-width: 500px;
            margin: 0 auto;
        }
        h1 { margin-bottom: 30px; }
        .setting-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .setting-label { font-size: 16px; }
        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
            background: var(--toggle-bg);
            border-radius: 15px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        .toggle-switch.active {
            background: var(--toggle-active);
        }
        .toggle-switch.active::after {
            transform: translateX(30px);
        }
        .status-toast {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 4px;
            z-index: 100;
        }
        .status-toast.success {
            background: #28a745;
            color: white;
        }
        .status-toast.error {
            background: #d9534f;
            color: white;
        }
        .confirm-dialog {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 101;
        }
        .confirm-dialog p { margin-bottom: 20px; }
        .confirm-dialog button {
            padding: 10px 20px;
            margin-right: 10px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
        }
        .btn-confirm { background: #28a745; color: white; }
        .btn-cancel { background: #ccc; }
    </style>
</head>
<body>
    <div class="settings-container">
        <h1>⚙️ Settings</h1>
        
        <div class="setting-card">
            <span class="setting-label">Dark Mode</span>
            <div class="toggle-switch" id="darkModeToggle" onclick="toggleDarkMode()"></div>
        </div>
        
        <div class="setting-card">
            <span class="setting-label">Notifications</span>
            <div class="toggle-switch" id="notifToggle"></div>
        </div>
        
        <div class="setting-card">
            <span class="setting-label">Auto-save</span>
            <div class="toggle-switch" id="autosaveToggle"></div>
        </div>
    </div>
    
    <div class="status-toast success" id="fakeSuccess">
        ✓ Dark Mode enabled!
    </div>
    
    <div class="confirm-dialog" id="confirmDialog">
        <p>⚠️ Dark Mode requires a page reload to apply. Do you want to reload now?</p>
        <button class="btn-confirm" onclick="confirmReload()">Reload Now</button>
        <button class="btn-cancel" onclick="cancelReload()">Later</button>
    </div>

    <script>
        let toggleClicked = false;
        
        function toggleDarkMode() {
            const toggle = document.getElementById('darkModeToggle');
            
            toggle.classList.add('active');
            
            const toast = document.getElementById('fakeSuccess');
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
                document.getElementById('confirmDialog').style.display = 'block';
            }, 2000);
        }
        
        function confirmReload() {
            document.getElementById('confirmDialog').style.display = 'none';
            document.documentElement.setAttribute('data-theme', 'dark');
        }
        
        function cancelReload() {
            document.getElementById('confirmDialog').style.display = 'none';
        }
    </script>
</body>
</html>
