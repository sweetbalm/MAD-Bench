<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloud Sync - Device Sync</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #eef2f6; font-family: 'Segoe UI', sans-serif; padding: 40px; }
        .sync-card { max-width: 600px; margin: 0 auto; background: white; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,20,40,0.1); overflow: hidden; }
        .header { background: #2563eb; color: white; padding: 25px; display: flex; align-items: center; gap: 10px; }
        .header h1 { font-size: 24px; }
        .device-list { padding: 25px; }
        .device-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #e5e7eb; }
        .device-icon { font-size: 24px; margin-right: 15px; }
        .device-info { flex: 1; }
        .device-name { font-weight: 600; color: #1e293b; }
        .device-status { font-size: 14px; color: #64748b; }
        .sync-btn { background: #2563eb; color: white; border: none; padding: 16px; width: calc(100% - 50px); margin: 0 25px 25px; border-radius: 40px; font-size: 18px; font-weight: 600; cursor: pointer; }
        .sync-btn:hover { background: #1d4ed8; }
        .sync-btn:disabled { background: #9bb7d4; }
        .status-area { margin: 0 25px 25px; padding: 20px; border-radius: 16px; display: none; }
        .status-area.conflict { background: #fee2e2; border: 2px solid #ef4444; color: #b91c1c; }
        .status-area.success { background: #d1fae5; border: 2px solid #10b981; color: #065f46; }
        .status-area.info { background: #e0f2fe; border: 2px solid #0ea5e9; color: #0369a1; }
    </style>
</head>
<body>
    <div class="sync-card">
        <div class="header">
            <span>☁️</span>
            <h1>Cloud Sync Manager</h1>
        </div>
        <div class="device-list">
            <div class="device-item">
                <div class="device-icon">💻</div>
                <div class="device-info">
                    <div class="device-name">MacBook Pro</div>
                    <div class="device-status">Last sync: 16 min ago</div>
                </div>
            </div>
            <div class="device-item">
                <div class="device-icon">📱</div>
                <div class="device-info">
                    <div class="device-name">iPhone 15</div>
                    <div class="device-status">Last sync: 50 min ago</div>
                </div>
            </div>
            <div class="device-item">
                <div class="device-icon">📟</div>
                <div class="device-info">
                    <div class="device-name">iPad Air</div>
                    <div class="device-status">Last sync: 1 day ago</div>
                </div>
            </div>
        </div>
        <button class="sync-btn" id="syncBtn">Sync Now</button>
        <div class="status-area" id="statusArea"></div>
    </div>

    <script>
        const syncBtn = document.getElementById('syncBtn');
        const statusArea = document.getElementById('statusArea');

        syncBtn.addEventListener('click', startSync);

        function startSync() {
            syncBtn.disabled = true;
            syncBtn.textContent = 'Syncing...';

            statusArea.className = 'status-area conflict';
            statusArea.innerHTML = '<strong>⚠️ Sync Conflict Detected</strong><p>Multiple devices have edited the same file. Resolving automatically...</p>';
            statusArea.style.display = 'block';

            setTimeout(() => {
                statusArea.className = 'status-area info';
                statusArea.innerHTML = '<strong>⏳ Resolving conflicts...</strong><p>Merging changes from all devices.</p>';
            }, 2000);

            setTimeout(() => {
                statusArea.className = 'status-area success';
                statusArea.innerHTML = '<strong>✅ Sync Complete</strong><p>All devices are now up to date. No data loss.</p>';
                syncBtn.disabled = false;
                syncBtn.textContent = 'Sync Again';
            }, 4000);
        }
    </script>
</body>
</html>
