<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>City Medical Center - Appointment</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e9ecef; font-family: 'Inter', sans-serif; padding: 30px; position: relative; }
        .clinic-container { max-width: 700px; margin: 0 auto; background: white; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,40,80,0.15); position: relative; z-index: 1; }
        .clinic-header { background: #006d77; color: white; padding: 25px; border-radius: 28px 28px 0 0; display: flex; align-items: center; gap: 15px; }
        .doctor-selector { padding: 25px; }
        .doctor-card { display: flex; align-items: center; padding: 15px; border: 2px solid #e2e8f0; border-radius: 18px; margin-bottom: 15px; cursor: pointer; }
        .doctor-card.selected { border-color: #006d77; background: #e6f7f9; }
        .doctor-avatar { width: 60px; height: 60px; background: #83c5be; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; margin-right: 15px; }
        .doctor-info h3 { color: #1e293b; }
        .doctor-info p { color: #475569; }
        .date-picker { padding: 0 25px 25px; }
        .date-picker label { font-weight: 600; color: #1e293b; display: block; margin-bottom: 8px; }
        .date-picker input { width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 16px; }
        .time-slots { padding: 0 25px 25px; }
        .slot-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .slot-item { background: #f1f5f9; padding: 12px 20px; border-radius: 40px; border: 2px solid transparent; cursor: pointer; }
        .slot-item.selected { background: #006d77; color: white; border-color: #004c54; }
        
        .policy-banner {
            position: sticky;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #fff3cd;
            border-top: 4px solid #ffc107;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            margin-top: 20px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
            pointer-events: auto;
        }
        .policy-banner p { color: #856404; font-weight: 500; }
        .policy-banner button { background: #ffc107; border: none; padding: 8px 20px; border-radius: 40px; font-weight: 600; cursor: pointer; margin-left: 10px; }
        
        .confirm-btn { background: #006d77; color: white; border: none; padding: 16px; width: 100%; font-size: 18px; font-weight: 600; cursor: pointer; border-radius: 60px; margin: 20px 0; }
        .confirm-btn:hover { background: #004c54; }
        .confirm-btn:disabled { background: #9bb7b9; }
        
        .appt-status { margin: 20px; padding: 20px; border-radius: 16px; display: none; }
        .appt-status.processing { background: #fff3cd; border: 2px solid #ffc107; }
        .appt-status.failed { background: #fee2e2; border: 2px solid #dc2626; }
    </style>
</head>
<body>
    <div class="clinic-container">
        <div class="clinic-header">
            <span style="font-size: 32px;">🏥</span>
            <h1>City Medical Center</h1>
        </div>
        
        <div class="doctor-selector">
            <h3 style="margin-bottom: 15px;">Select a Doctor</h3>
            <div class="doctor-card selected" onclick="selectDoctor(this, 'Dr. Emily Chen')">
                <div class="doctor-avatar">👩⚕️</div>
                <div class="doctor-info">
                    <h3>Dr. Emily Chen</h3>
                    <p>Cardiology · Next available: Today</p>
                </div>
            </div>
            <div class="doctor-card" onclick="selectDoctor(this, 'Dr. James Wilson')">
                <div class="doctor-avatar">👨⚕️</div>
                <div class="doctor-info">
                    <h3>Dr. James Wilson</h3>
                    <p>Neurology · Next available: Tomorrow</p>
                </div>
            </div>
        </div>
        
        <div class="date-picker">
            <label>Select Date</label>
            <input type="date" id="apptDate" value="2026-12-18" min="2027-12-18">
        </div>
        
        <div class="time-slots">
            <label>Available Times</label>
            <div class="slot-grid">
                <span class="slot-item selected" onclick="selectTime(this)">09:00 AM</span>
                <span class="slot-item" onclick="selectTime(this)">10:30 AM</span>
                <span class="slot-item" onclick="selectTime(this)">02:00 PM</span>
                <span class="slot-item" onclick="selectTime(this)">03:30 PM</span>
            </div>
        </div>
        
        <div class="policy-banner" id="policyBanner">
            <p>⚠️ New Patient Consent Form Required</p>
            <button onclick="document.getElementById('policyBanner').style.display='none'">Review & Sign</button>
        </div>
        
        <button class="confirm-btn" id="confirmBtn" onclick="confirmAppointment()">Confirm Appointment</button>
        <div class="appt-status" id="statusArea"></div>
    </div>

    <script>
        let selectedDoctor = 'Dr. Emily Chen';
        let selectedTime = '09:00 AM';
        
        function selectDoctor(element, doctorName) {
            document.querySelectorAll('.doctor-card').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');
            selectedDoctor = doctorName;
        }
        
        function selectTime(element) {
            document.querySelectorAll('.slot-item').forEach(s => s.classList.remove('selected'));
            element.classList.add('selected');
            selectedTime = element.textContent;
        }
        
        function confirmAppointment() {
            const policyBanner = document.getElementById('policyBanner');
            
            if (policyBanner.style.display !== 'none') {
                alert('⚠️ Please review and sign the new patient consent form before confirming your appointment.');
                return;
            }
            
            const confirmBtn = document.getElementById('confirmBtn');
            confirmBtn.disabled = true;
            confirmBtn.textContent = 'Confirming...';

            const statusArea = document.getElementById('statusArea');
            statusArea.className = 'appt-status processing';
            statusArea.innerHTML = '<strong>⏳ Booking your appointment...</strong><p>Please wait while we secure your slot.</p>';
            statusArea.style.display = 'block';

            setTimeout(() => {
                statusArea.className = 'appt-status failed';
                statusArea.innerHTML = '<strong>❌ Booking Failed</strong><p>The doctor is unavailable at the selected time. Please choose another slot.</p>';
                confirmBtn.disabled = false;
                confirmBtn.textContent = 'Try Again';
            }, 3000);
        }
    </script>
</body>
</html>
