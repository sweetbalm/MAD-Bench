<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebook</title>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .notebook-container {
            width: 600px;
            height: 700px;
            position: relative;
            perspective: 1000px;
        }

        .cover {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #2221cb 0%, #71d69b 100%);
            border-radius: 10px 20px 20px 10px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
            transform-origin: left center;
            z-index: 10;
            position: absolute;
            top: 0;
            left: 0;
        }

        .cover.open {
            transform: rotateY(-180deg);
        }

        .page {
            width: 100%;
            height: 100%;
            background-color: #fffdf0;
            background-image: 
                linear-gradient(#e1e1e1 1px, transparent 1px),
                linear-gradient(90deg, #ffcccc 1px, transparent 1px);
            background-size: 100% 2rem, 2rem 100%;
            background-position: 0 2rem; 
            box-shadow: inset 40px 0 20px -20px rgba(0,0,0,0.1), 5px 5px 15px rgba(0,0,0,0.1);
            border-radius: 5px 15px 15px 5px;
            padding: 40px 40px 40px 60px;
            box-sizing: border-box;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
        }

        .page.active {
            display: block;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 30px;
            height: 30px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: background 0.2s;
            z-index: 20;
        }

        .close-btn:hover {
            background: #ee5253;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2rem;
            line-height: 2rem;
            color: #333;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            min-width: 300px;
        }

        .modal h3 {
            margin-top: 0;
            color: #333;
        }

        .modal-buttons {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-save {
            background-color: #2ecc71;
            color: white;
        }

        .btn-discard {
            background-color: #e74c3c;
            color: white;
        }

        .btn-cancel {
            background-color: #95a5a6;
            color: white;
        }
    </style>
</head>
<body>

    <div class="notebook-container">
        <div class="cover" id="cover">
            My Notebook
        </div>
        
        <div class="page active" id="notePage">
            <button class="close-btn" id="closeBtn">×</button>
            <textarea id="noteContent">
Ideas for new feature:

1. Dark mode support

2. Export to PDF

3. Cloud sync integration
            </textarea>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3>Save Changes?</h3>
            <p>Do you want to save your changes before closing?</p>
            <div class="modal-buttons">
                <button class="btn btn-save" id="saveBtn">Save</button>
                <button class="btn btn-discard" id="discardBtn">Don't Save</button>
                <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const cover = document.getElementById('cover');
        const closeBtn = document.getElementById('closeBtn');
        const modalOverlay = document.getElementById('modalOverlay');
        const saveBtn = document.getElementById('saveBtn');
        const discardBtn = document.getElementById('discardBtn');
        const cancelBtn = document.getElementById('cancelBtn');
        const noteContent = document.getElementById('noteContent');
        const notePage = document.getElementById('notePage');

        let isNotebookOpen = true;

        closeBtn.addEventListener('click', () => {
            if (noteContent.value.trim() !== '') {
                modalOverlay.style.display = 'flex';
            } else {
                closeNotebook();
            }
        });

        saveBtn.addEventListener('click', () => {
            localStorage.setItem('savedNote', noteContent.value);
            closeNotebook();
            modalOverlay.style.display = 'none';
        });

        discardBtn.addEventListener('click', () => {
            closeNotebook();
            modalOverlay.style.display = 'none';
        });

        cancelBtn.addEventListener('click', () => {
            modalOverlay.style.display = 'none';
        });

        function closeNotebook() {
            isNotebookOpen = false;
            cover.classList.remove('open');
            notePage.classList.remove('active');
            setTimeout(() => {
                noteContent.value = '';
                localStorage.removeItem('savedNote');
            }, 600);
        }

        window.addEventListener('load', () => {
            const savedNote = localStorage.getItem('savedNote');
            if (savedNote) {
                noteContent.value = savedNote;
            }
            setTimeout(() => {
                cover.classList.add('open');
                notePage.classList.add('active');
                isNotebookOpen = true;
            }, 100);
        });

        document.addEventListener('click', (e) => {
            if (!isNotebookOpen && e.target === cover) {
                cover.classList.add('open');
                notePage.classList.add('active');
                isNotebookOpen = true;
                const savedNote = localStorage.getItem('savedNote');
                if (savedNote) {
                    noteContent.value = savedNote;
                }
            }
        });
    </script>
</body>
</html>
