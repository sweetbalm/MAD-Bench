<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChatApp - Send Message</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 30px; }
        .chat-container { max-width: 500px; margin: 0 auto; background: white; border-radius: 28px; box-shadow: 0 12px 28px rgba(0,0,0,0.12); overflow: hidden; }
        .chat-header { background: #0084ff; color: white; padding: 20px; font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .chat-area { height: 400px; padding: 20px; overflow-y: auto; background: #f0f2f5; display: flex; flex-direction: column; }
        .message { max-width: 70%; padding: 12px 16px; border-radius: 20px; margin-bottom: 12px; align-self: flex-end; background: #0084ff; color: white; }
        .message.system { align-self: center; background: #e4e6eb; color: #050505; font-size: 13px; }
        .input-area { display: flex; padding: 15px; border-top: 1px solid #ddd; background: white; }
        .input-area input { flex: 1; padding: 12px 16px; border: 2px solid #e4e6eb; border-radius: 30px; font-size: 16px; outline: none; }
        .send-btn { background: #0084ff; color: white; border: none; padding: 12px 25px; border-radius: 30px; margin-left: 10px; font-weight: 600; cursor: pointer; }
        .send-btn:disabled { background: #b2c9f0; cursor: not-allowed; }
        .status-bar { padding: 12px 20px; background: #f8f9fa; border-top: 1px solid #dee2e6; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .status-bar .indicator { width: 10px; height: 10px; border-radius: 50%; background: #dc3545; display: inline-block; }
        .status-bar .indicator.success { background: #28a745; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <span>💬</span> Chat with Support
        </div>
        <div class="chat-area" id="chatArea">
            <div class="message system">You're now connected to support.</div>
            <div class="message">Hi, I need help with my account.</div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." value="I forgot my password">
            <button class="send-btn" id="sendBtn">Send</button>
        </div>
        <div class="status-bar" id="statusBar">
            <span class="indicator" id="statusIndicator"></span>
            <span id="statusText">Connected</span>
        </div>
    </div>

    <script>
        let retryCount = 0;
        const sendBtn = document.getElementById('sendBtn');
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const chatArea = document.getElementById('chatArea');
        let timer;

        sendBtn.addEventListener('click', sendMessage);

        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';

            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';

            simulateFailure();
        }

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.textContent = text;
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function simulateFailure() {
            statusIndicator.className = 'indicator';
            statusText.textContent = 'Network disconnected, retrying...';
            statusIndicator.style.backgroundColor = '#dc3545';

            const sysMsg = document.createElement('div');
            sysMsg.className = 'message system';
            sysMsg.textContent = '⚠️ Message failed to send. Retrying...';
            chatArea.appendChild(sysMsg);
            chatArea.scrollTop = chatArea.scrollHeight;

            let attempts = 0;
            const maxAttempts = 3;
            const retryInterval = setInterval(() => {
                attempts++;
                if (attempts < maxAttempts) {
                    statusText.textContent = `Retry attempt ${attempts}/${maxAttempts}...`;
                } else {
                    clearInterval(retryInterval);
                    simulateSuccess();
                }
            }, 1500);
        }

        function simulateSuccess() {
            statusIndicator.style.backgroundColor = '#28a745';
            statusText.textContent = 'Connected';

            const sysMsg = document.createElement('div');
            sysMsg.className = 'message system';
            sysMsg.textContent = '✅ Network restored. Message sent!';
            chatArea.appendChild(sysMsg);

            setTimeout(() => {
                const sentMsg = document.createElement('div');
                sentMsg.className = 'message';
                sentMsg.textContent = 'I forgot my password';
                chatArea.appendChild(sentMsg);
                chatArea.scrollTop = chatArea.scrollHeight;

                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
            }, 500);
        }
    </script>
</body>
</html>
