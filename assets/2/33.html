<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nature Publishing - Manuscript Submission</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f5f5; font-family: 'Times New Roman', serif; padding: 30px; }
        .journal-card { max-width: 800px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .header { background: #2c3e50; color: white; padding: 30px; border-radius: 16px 16px 0 0; }
        .header h1 { font-size: 28px; font-weight: 400; }
        .sub-header { background: #ecf0f1; padding: 15px 30px; border-bottom: 2px solid #bdc3c7; }
        .paper-meta { padding: 30px; }
        .meta-row { margin-bottom: 20px; }
        .meta-row label { font-weight: 600; color: #34495e; display: block; margin-bottom: 5px; }
        .meta-row input, .meta-row textarea { width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 8px; font-family: inherit; }
        .meta-row textarea { min-height: 100px; }
        .file-info { background: #f8f9fa; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .submit-btn { background: #27ae60; color: white; border: none; padding: 15px 40px; border-radius: 40px; font-size: 18px; cursor: pointer; }
        .submit-btn:hover { background: #229954; }
        .submit-btn:disabled { background: #95a5a6; }
        .status-area { margin-top: 20px; padding: 20px; border-radius: 8px; display: none; }
        .status-area.processing { background: #fff3cd; border: 2px solid #f39c12; }
        .status-area.failed { background: #fadbd8; border: 2px solid #e74c3c; }
        .status-area.success { background: #d4efdf; border: 2px solid #27ae60; }
        .attempt-counter { margin-top: 10px; color: #7f8c8d; font-size: 14px; }
    </style>
</head>
<body>
    <div class="journal-card">
        <div class="header">
            <h1>📄 Nature · Scientific Reports</h1>
        </div>
        <div class="sub-header">
            <span>Manuscript Submission System</span>
        </div>
        <div class="paper-meta">
            <div class="meta-row">
                <label>Manuscript Title</label>
                <input type="text" id="title" value="Quantum Computing Approaches for Protein Folding">
            </div>
            <div class="meta-row">
                <label>Authors</label>
                <input type="text" id="authors" value="A. Smith, B. Johnson, C. Lee">
            </div>
            <div class="meta-row">
                <label>Abstract</label>
                <textarea id="abstract">We present a novel quantum algorithm for simulating protein folding dynamics...</textarea>
            </div>
            <div class="file-info">
                <span style="font-weight: 600;">📁 manuscript.pdf</span> (2.8 MB) uploaded
            </div>
            <button class="submit-btn" id="submitBtn">Submit to Journal</button>
            <div class="status-area" id="statusArea"></div>
            <div class="attempt-counter" id="attemptCounter">Submission attempts: 0</div>
        </div>
    </div>

    <script>
        let attempts = 0;
        const submitBtn = document.getElementById('submitBtn');
        const statusArea = document.getElementById('statusArea');
        const toast = document.getElementById('toast');
        const attemptCounter = document.getElementById('attemptCounter');
        
        submitBtn.addEventListener('click', submitPaper);
        
        function submitPaper() {
            attempts++;
            attemptCounter.textContent = `Submission attempts: ${attempts}`;
            
            const isSuccess = Math.random() < 0.3;
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            
            statusArea.className = 'status-area processing';
            statusArea.innerHTML = '<strong>⏳ Submitting to editorial system...</strong><p>Your manuscript is being processed.</p>';
            statusArea.style.display = 'block';
            
            setTimeout(() => {
                if (isSuccess) {
                    statusArea.className = 'status-area success';
                    statusArea.innerHTML = '<strong>✅ Submission Successful</strong><p>Your manuscript has been received. Manuscript ID: NPG-' + Math.floor(Math.random()*10000) + '</p>';
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Submitted';
                } else {
                    const failure = 'Connection lost. Please retry.';
                    
                    statusArea.className = 'status-area failed';
                    statusArea.innerHTML = `<strong>❌ Submission Failed</strong><p>${failure}</p>`;
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Revise and Resubmit';
                }
            }, 3000);
        }
    </script>
</body>
</html>
