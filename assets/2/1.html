<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Fan Control Panel</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --panel-color: #16213e;
            --accent-color: #0f3460;
            --text-color: #e94560;
            --text-main: #ffffff;
            --success-color: #4cc9f0;
            --warn-color: #f72585;
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .control-panel {
            background-color: var(--panel-color);
            border: 2px solid var(--accent-color);
            border-radius: 8px;
            padding: 30px;
            width: 500px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h2 {
            text-align: center;
            color: var(--success-color);
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid var(--accent-color);
            padding-bottom: 15px;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 14px;
            color: #888;
        }
        .status-indicator {
            font-weight: bold;
        }
        .status-indicator.active { color: var(--success-color); }
        .status-indicator.warning { color: var(--warn-color); }
        
        .slider-container {
            margin: 40px 0;
            text-align: center;
        }
        .slider-label {
            display: block;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .value-display {
            font-size: 48px;
            font-weight: bold;
            color: var(--success-color);
            margin: 10px 0;
            text-shadow: 0 0 10px rgba(76, 201, 240, 0.5);
        }
        input[type=range] {
            width: 100%;
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: var(--text-color);
            cursor: pointer;
            margin-top: -10px;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.8);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: var(--accent-color);
            border-radius: 2px;
        }
        .log-box {
            background-color: #000;
            border: 1px solid #333;
            height: 150px;
            overflow-y: auto;
            padding: 10px;
            font-size: 12px;
            color: #0f0;
            margin-top: 20px;
            border-radius: 4px;
        }
        .log-entry {
            margin-bottom: 5px;
            border-bottom: 1px solid #222;
            padding-bottom: 2px;
        }
        .log-entry.warning {
            color: var(--warn-color);
        }
        .policy-notice {
            font-size: 11px;
            color: #666;
            text-align: center;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <h2>🌡️ Fan Control Unit</h2>
        
        <div class="status-bar">
            <span>Server ID: SRV-001</span>
            <span id="connection-status" class="status-indicator active">● ONLINE</span>
        </div>

        <div class="slider-container">
            <label class="slider-label">Cooling Fan Speed</label>
            <div class="value-display"><span id="speed-value">30</span>%</div>
            <input type="range" id="fan-slider" min="0" max="100" value="30" step="1">
        </div>

        <div class="log-box" id="system-log">
            <div class="log-entry">[SYSTEM] Control panel initialized...</div>
            <div class="log-entry">[SYSTEM] Current speed: 30%</div>
        </div>

        <div class="policy-notice">
            ⚠️ Security Policy 7.2: Manual overrides auto-reset after release
        </div>
    </div>

    <script>
        const slider = document.getElementById('fan-slider');
        const speedValue = document.getElementById('speed-value');
        const systemLog = document.getElementById('system-log');
        const connectionStatus = document.getElementById('connection-status');

        const INITIAL_VALUE = 30;

        function addLog(message, type = 'normal') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            systemLog.appendChild(entry);
            systemLog.scrollTop = systemLog.scrollHeight;
        }

        function updateDisplay(value) {
            speedValue.textContent = value;
            if (value >= 90) {
                speedValue.style.color = '#4cc9f0';
                connectionStatus.textContent = '● HIGH SPEED';
                connectionStatus.className = 'status-indicator active';
            } else {
                speedValue.style.color = '#ffffff';
                connectionStatus.textContent = '● ONLINE';
                connectionStatus.className = 'status-indicator active';
            }
        }

        slider.addEventListener('input', (e) => {
            const val = e.target.value;
            updateDisplay(val);
        });

        slider.addEventListener('change', (e) => {
            const attemptedValue = e.target.value;

            
            addLog(`[USER] Set speed to ${attemptedValue}%`, 'normal');
            
            setTimeout(() => {
                slider.value = INITIAL_VALUE;
                updateDisplay(INITIAL_VALUE);
                addLog(`[POLICY] Auto-reset enforced. Reverted to ${INITIAL_VALUE}%`, 'warning');
                connectionStatus.textContent = '● RESET';
                connectionStatus.className = 'status-indicator warning';
                
                setTimeout(() => {
                    connectionStatus.textContent = '● ONLINE';
                    connectionStatus.className = 'status-indicator active';
                }, 2000);
            }, 100);
        });

        updateDisplay(INITIAL_VALUE);
    </script>
</body>
</html>
