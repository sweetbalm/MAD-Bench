<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 50px; width: 100%; max-width: 420px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo-icon { width: 70px; height: 70px; background: linear-gradient(135deg, #3498db, #2980b9); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 32px; margin: 0 auto 15px; }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 30px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #555; font-weight: 600; margin-bottom: 8px; font-size: 14px; }
        .form-group input { width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; }
        .form-group input:focus { outline: none; border-color: #3498db; }
        .login-btn { width: 100%; background: linear-gradient(135deg, #3498db, #2980b9); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .login-btn:disabled { background: #95a5a6; cursor: not-allowed; }

        .login-error {
            display: none;
            background: #f8d7da;
            border: 2px solid #e74c3c;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
        }
        .login-error.show { display: block; }
        .login-error h4 { color: #e74c3c; margin-bottom: 8px; font-size: 15px; }
        .login-error p { color: #721c24; font-size: 13px; }

        .verifying-status {
            display: none;
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
        }
        .verifying-status.show { display: block; }
        .verifying-status h4 { color: #856404; margin-bottom: 8px; font-size: 15px; }
        .spinner { 
            display: inline-block; 
            width: 20px; 
            height: 20px; 
            border: 3px solid #ffc107; 
            border-top-color: transparent; 
            border-radius: 50%; 
            animation: spin 1s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .login-success {
            display: none;
            background: #d4edda;
            border: 2px solid #27ae60;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            text-align: center;
        }
        .login-success.show { display: block; }
        .login-success h4 { color: #27ae60; margin-bottom: 8px; font-size: 15px; }
        .login-success p { color: #155724; font-size: 13px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">🏢</div>
            <h1>Enterprise Portal</h1>
        </div>
        
        <form id="loginForm" onsubmit="return false;">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" value="jsmith@company.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" value="SecurePass123!">
            </div>
            <button class="login-btn" id="loginBtn" onclick="attemptLogin()">Sign In</button>
        </form>
        
        <div class="login-error" id="loginError">
            <h4>✗ Authentication Failed</h4>
            <p>Unable to connect to authentication server. Retrying automatically...</p>
        </div>
        
        <div class="verifying-status" id="verifyingStatus">
            <h4><span class="spinner"></span>Verifying Credentials...</h4>
            <p>Connecting to enterprise directory service.</p>
        </div>
        
        <div class="login-success" id="loginSuccess">
            <h4>✓ Login Successful!</h4>
            <p>Welcome back, John Smith! Redirecting to dashboard...</p>
        </div>
    </div>
    
    <script>
        let loginAttempted = false;
        
        function attemptLogin() {
            if (loginAttempted) return;
            loginAttempted = true;
            
            const btn = document.getElementById('loginBtn');
            btn.disabled = true;
            btn.textContent = 'Signing In...';
            
            setTimeout(() => {
                document.getElementById('loginError').classList.add('show');
            }, 1000);
            
            setTimeout(() => {
                document.getElementById('loginError').classList.remove('show');
                document.getElementById('verifyingStatus').classList.add('show');
            }, 3500);
            
            setTimeout(() => {
                document.getElementById('verifyingStatus').classList.remove('show');
                document.getElementById('loginSuccess').classList.add('show');
                btn.textContent = 'Signed In';
            }, 7000);
        }
    </script>
</body>
</html>
