<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wood Furniture Certificate</title>
    <style>
        body {
            background: #3e2723;
            font-family: 'Georgia', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .certificate {
            width: 600px;
            background: #faf8f3;
            border: 8px solid #5d4037;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }
        .header {
            text-align: center;
            border-bottom: 3px double #8d6e63;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .company {
            font-size: 24px;
            color: #3e2723;
            letter-spacing: 3px;
        }
        .title {
            font-size: 18px;
            color: #5d4037;
            margin-top: 5px;
        }
        .content {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .photo-box {
            width: 120px;
            height: 120px;
            background: #efebe9;
            border: 2px solid #8d6e63;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .details {
            flex: 1;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
            padding: 5px 0;
            border-bottom: 1px dotted #d7ccc8;
        }
        .label {
            color: #8d6e63;
            font-weight: bold;
        }
        .value {
            color: #3e2723;
            font-family: 'Courier New', monospace;
        }
        .serial-blur {
            filter: blur(6px) opacity(0.4);
            background: #d7ccc8;
            padding: 2px 8px;
            border-radius: 3px;
        }
        .wood-code {
            background: #3e2723;
            color: transparent;
            padding: 2px 8px;
            border-radius: 3px;
        }
        .date-fade {
            filter: blur(4px) contrast(0.6);
            opacity: 0.5;
        }
        .footer {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #8d6e63;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .signature {
            font-family: 'Brush Script MT', cursive;
            font-size: 24px;
            color: #5d4037;
        }
        .seal {
            width: 60px;
            height: 60px;
            border: 3px solid #8d6e63;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8d6e63;
            font-size: 12px;
            transform: rotate(-10deg);
            opacity: 0.6;
        }
        .stain {
            position: absolute;
            width: 80px;
            height: 60px;
            background: radial-gradient(ellipse at center, rgba(139, 69, 19, 0.2) 0%, transparent 70%);
            filter: blur(8px);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="certificate" style="position: relative;">
        <div class="stain" style="top: 80px; right: 40px;"></div>
        <div class="stain" style="bottom: 80px; left: 30px;"></div>
        
        <div class="header">
            <div class="company">Heritage Woodworks</div>
            <div class="title">Certificate of Authenticity</div>
        </div>
        
        <div class="content">
            <div class="photo-box">🪑</div>
            <div class="details">
                <div class="detail-row">
                    <span class="label">Product:</span>
                    <span class="value">Oak Dining Table</span>
                </div>
                <div class="detail-row">
                    <span class="label">Dimensions:</span>
                    <span class="value">72" × 36" × 30"</span>
                </div>
                <div class="detail-row">
                    <span class="label">Serial Number:</span>
                    <span class="value serial-blur">HW-2024-884729</span>
                </div>
                <div class="detail-row">
                    <span class="label">Wood Species:</span>
                    <span class="value">White Oak</span>
                </div>
                <div class="detail-row">
                    <span class="label">Species Code:</span>
                    <span class="value wood-code">QUR-ALB-001</span>
                </div>
                <div class="detail-row">
                    <span class="label">Manufactured:</span>
                    <span class="value date-fade">October 2024</span>
                </div>
            </div>
        </div>
        
        <div class="footer">
            <div>
                <div style="font-size: 11px; color: #8d6e63; margin-bottom: 5px;">Master Craftsman</div>
                <div class="signature">J. Miller</div>
            </div>
            <div class="seal">AUTHENTIC</div>
        </div>
    </div>
</body>
</html>
