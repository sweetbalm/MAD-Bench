<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boarding Pass - SkyAir</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Roboto+Mono:wght@400;700&display=swap');
        
        body {
            background: #1a1f2e;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(52, 152, 219, 0.1) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(46, 204, 113, 0.1) 0%, transparent 20%);
        }
        .boarding-pass {
            width: 750px;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            display: flex;
            position: relative;
        }
        .main-section {
            flex: 2;
            padding: 40px;
            position: relative;
        }
        .stub-section {
            flex: 1;
            background: #f8f9fa;
            padding: 40px 30px;
            border-left: 2px dashed #bdc3c7;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .airline-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }
        .logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 24px;
            margin-right: 15px;
        }
        .airline-name {
            font-size: 24px;
            font-weight: 600;
            color: #2c3e50;
            letter-spacing: 1px;
        }
        .route {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 30px 0;
            padding: 20px 0;
            border-top: 1px solid #ecf0f1;
            border-bottom: 1px solid #ecf0f1;
        }
        .airport {
            text-align: center;
        }
        .airport-code {
            font-family: 'Oswald', sans-serif;
            font-size: 48px;
            font-weight: 600;
            color: #2c3e50;
            line-height: 1;
        }
        .airport-city {
            font-size: 14px;
            color: #7f8c8d;
            margin-top: 5px;
        }
        .plane-icon {
            font-size: 32px;
            color: #bdc3c7;
            margin: 0 30px;
        }
        .flight-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-top: 30px;
        }
        .detail-box {
            position: relative;
        }
        .detail-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #95a5a6;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .detail-value {
            font-family: 'Oswald', sans-serif;
            font-size: 28px;
            color: #2c3e50;
            font-weight: 600;
        }
        .blurred-heavy {
            filter: blur(8px) opacity(0.6);
            user-select: none;
        }
        .black-bar {
            background: #2c3e50;
            color: #2c3e50;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .scratched {
            position: relative;
        }
        .scratched::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                repeating-linear-gradient(
                    -45deg,
                    transparent,
                    transparent 2px,
                    rgba(0,0,0,0.1) 2px,
                    rgba(0,0,0,0.1) 4px
                );
            pointer-events: none;
        }
        .barcode {
            height: 80px;
            background: repeating-linear-gradient(
                90deg,
                #000 0px,
                #000 3px,
                #fff 3px,
                #fff 6px,
                #000 6px,
                #000 9px,
                #fff 9px,
                #fff 12px
            );
            margin-top: 30px;
            border-radius: 4px;
        }
        .passenger {
            margin-bottom: 20px;
        }
        .passenger-name {
            font-size: 20px;
            font-weight: 600;
            color: #2c3e50;
        }
        .class-badge {
            display: inline-block;
            background: #f39c12;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
        }
        .gate-close {
            background: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
            font-weight: 600;
        }
        .seq-number {
            font-family: 'Roboto Mono', monospace;
            font-size: 12px;
            color: #95a5a6;
            text-align: center;
            margin-top: 20px;
        }
        .fold-mark {
            position: absolute;
            bottom: 100px;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.1) 50%, transparent 100%);
        }
        .grunge-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 30% 70%, rgba(0,0,0,0.03) 0%, transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(0,0,0,0.02) 0%, transparent 40%);
            pointer-events: none;
        }
        .time-corrupted {
            position: relative;
            display: inline-block;
        }
        .time-corrupted::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -5px;
            right: -5px;
            height: 3px;
            background: rgba(231, 76, 60, 0.3);
            transform: translateY(-50%) rotate(-2deg);
        }
    </style>
</head>
<body>
    <div class="boarding-pass">
        <div class="grunge-overlay"></div>
        <div class="main-section">
            <div class="airline-header">
                <div class="logo">✈</div>
                <div class="airline-name">SkyAir International</div>
            </div>
            
            <div class="passenger">
                <div style="font-size: 12px; color: #7f8c8d; text-transform: uppercase;">Passenger</div>
                <div class="passenger-name">JENNIFER MARTINEZ</div>
                <span class="class-badge">Business Class</span>
            </div>
            
            <div class="route">
                <div class="airport">
                    <div class="airport-code">JFK</div>
                    <div class="airport-city">New York</div>
                </div>
                <div class="plane-icon">✈</div>
                <div class="airport">
                    <div class="airport-code">LHR</div>
                    <div class="airport-city">London</div>
                </div>
            </div>
            
            <div class="flight-details">
                <div class="detail-box">
                    <div class="detail-label">Flight</div>
                    <div class="detail-value scratched">
                        <span style="filter: blur(4px);">SA284</span>
                    </div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Date</div>
                    <div class="detail-value">14DEC</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Departure</div>
                    <div class="detail-value time-corrupted blurred-heavy">10:30</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Gate</div>
                    <div class="detail-value black-bar">B12</div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Seat</div>
                    <div class="detail-value" style="position: relative;">
                        <span style="filter: blur(5px) opacity(0.5);">4A</span>
                        <div style="position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px; background: linear-gradient(90deg, transparent 40%, rgba(0,0,0,0.1) 50%, transparent 60%);"></div>
                    </div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Group</div>
                    <div class="detail-value">1</div>
                </div>
            </div>
            
            <div class="barcode"></div>
        </div>
        
        <div class="stub-section">
            <div>
                <div style="font-size: 24px; font-weight: 600; color: #2c3e50;">SkyAir</div>
                <div style="font-size: 12px; color: #7f8c8d; margin-top: 5px;">SA284</div>
            </div>
            
            <div>
                <div class="detail-label">Seat</div>
                <div class="detail-value" style="font-size: 36px;">
                    <span class="black-bar">██</span>
                </div>
            </div>
            
            <div>
                <div class="detail-label">Gate Closes</div>
                <div class="detail-value blurred-heavy" style="font-size: 20px;">10:15</div>
            </div>
            
            <div class="barcode" style="height: 60px;"></div>
            <div class="seq-number">SEQ: 042</div>
        </div>
    </div>
</body>
</html>
