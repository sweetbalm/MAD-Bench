<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ski Resort Pass</title>
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .ski-pass {
            width: 500px;
            background: linear-gradient(180deg, #fff 0%, #f0f8ff 100%);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            overflow: hidden;
            position: relative;
        }
        .mountain-header {
            height: 120px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 30px;
            color: white;
        }
        .mountain-icon {
            font-size: 48px;
            margin-right: 20px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .resort-name {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .resort-location {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 5px;
        }
        .pass-body {
            padding: 25px;
        }
        .pass-type {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #2a5298;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .holder-info {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .photo-slot {
            width: 100px;
            height: 120px;
            background: #e8e8e8;
            border: 3px solid #2a5298;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }
        .holder-details {
            flex: 1;
        }
        .detail-line {
            margin: 8px 0;
            font-size: 14px;
        }
        .detail-label {
            color: #666;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .detail-value {
            font-weight: bold;
            color: #2c3e50;
            font-size: 16px;
        }
        .id-obscured {
            filter: blur(6px) opacity(0.4);
            background: #bdc3c7;
            padding: 2px 8px;
            border-radius: 3px;
            display: inline-block;
        }
        .access-section {
            background: #f8f9fa;
            border: 2px solid #2a5298;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .access-title {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .lift-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .lift-tag {
            background: #2a5298;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }
        .lift-tag.blocked {
            background: #7f8c8d;
            position: relative;
        }
        .lift-tag.blocked::after {
            content: '✕';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e74c3c;
            font-size: 20px;
            font-weight: bold;
        }
        .expiration-box {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            margin-bottom: 15px;
        }
        .expire-label {
            font-size: 11px;
            color: #856404;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .expire-date {
            font-size: 28px;
            font-weight: bold;
            color: #856404;
            margin-top: 5px;
        }
        .date-frosted {
            filter: blur(8px) opacity(0.3);
            color: transparent;
        }
        .barcode-strip {
            background: #ecf0f1;
            padding: 15px;
            text-align: center;
        }
        .barcode-lines {
            height: 50px;
            background: repeating-linear-gradient(
                90deg,
                #000 0px,
                #000 3px,
                #fff 3px,
                #fff 6px,
                #000 6px,
                #000 9px,
                #fff 9px,
                #fff 12px
            );
            margin-bottom: 8px;
        }
        .snow-pattern {
            position: absolute;
            font-size: 20px;
            opacity: 0.1;
            pointer-events: none;
        }
        .frost-damage {
            position: absolute;
            width: 80px;
            height: 60px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.4) 0%, transparent 70%);
            filter: blur(8px);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="ski-pass" style="position: relative;">
        <div class="snow-pattern" style="top: 20px; left: 30px;">❄</div>
        <div class="snow-pattern" style="top: 50px; right: 40px;">❄</div>
        <div class="snow-pattern" style="bottom: 100px; left: 20px;">❄</div>
        <div class="frost-damage" style="top: 150px; right: 30px;"></div>
        <div class="frost-damage" style="bottom: 80px; left: 40px;"></div>
        
        <div class="mountain-header">
            <div class="mountain-icon">⛷</div>
            <div>
                <div class="resort-name">Alpine Peaks</div>
                <div class="resort-location">Aspen, Colorado • Elevation: 11,212 ft</div>
            </div>
        </div>
        
        <div class="pass-body">
            <div class="pass-type">Season Pass 2024</div>
            
            <div class="holder-info">
                <div class="photo-slot">🏂</div>
                <div class="holder-details">
                    <div class="detail-line">
                        <div class="detail-label">Pass Holder</div>
                        <div class="detail-value">Jordan Blake</div>
                    </div>
                    <div class="detail-line">
                        <div class="detail-label">Holder ID</div>
                        <div class="detail-value"><span class="id-obscured">SKI-2024-884729</span></div>
                    </div>
                    <div class="detail-line">
                        <div class="detail-label">Age</div>
                        <div class="detail-value">28</div>
                    </div>
                </div>
            </div>
            
            <div class="access-section">
                <div class="access-title">Lift Access Level</div>
                <div class="lift-list">
                    <div class="lift-tag">Green</div>
                    <div class="lift-tag">Blue</div>
                    <div class="lift-tag">Black</div>
                    <div class="lift-tag blocked">Double Black</div>
                    <div class="lift-tag">Terrain Park</div>
                </div>
            </div>
            
            <div class="expiration-box">
                <div class="expire-label">Valid Through</div>
                <div class="expire-date date-frosted">April 15, 2025</div>
            </div>
        </div>
        
        <div class="barcode-strip">
            <div class="barcode-lines"></div>
            <div style="font-size: 11px; color: #666; letter-spacing: 2px;">
                <span style="background: #2c3e50; color: transparent; padding: 2px 6px; border-radius: 3px;">8847</span>-AP-2024
            </div>
        </div>
    </div>
</body>
</html>
