<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appliance Energy Label</title>
    <style>
        body {
            background: #2c3e50;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .label-card {
            width: 550px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: #27ae60;
            color: white;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand {
            font-size: 22px;
            font-weight: bold;
        }
        .model-tag {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
        }
        .body {
            padding: 25px;
        }
        .rating-section {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .efficiency-scale {
            flex: 1;
        }
        .scale-title {
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }
        .scale-bar {
            display: flex;
            height: 30px;
        }
        .scale-step {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }
        .a-plus { background: #27ae60; }
        .a { background: #2ecc71; }
        .b { background: #f1c40f; }
        .c { background: #e67e22; }
        .d { background: #e74c3c; }
        .arrow {
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 15px solid #2c3e50;
            position: absolute;
            right: -15px;
            top: 0;
        }
        .consumption-box {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            min-width: 150px;
        }
        .consumption-label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
        }
        .consumption-value {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
            margin: 5px 0;
        }
        .consumption-unit {
            font-size: 12px;
            color: #666;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .data-table td {
            padding: 10px;
            border-bottom: 1px solid #ecf0f1;
        }
        .data-table td:first-child {
            color: #666;
            width: 40%;
        }
        .data-table td:last-child {
            font-weight: bold;
            color: #2c3e50;
            font-family: 'Courier New', monospace;
        }
        .model-obscured {
            filter: blur(5px) opacity(0.4);
            background: #bdc3c7;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .warranty-code {
            background: #2c3e50;
            color: transparent;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .energy-blur {
            filter: blur(8px) opacity(0.3);
            color: transparent;
        }
        .footer-bar {
            background: #34495e;
            color: white;
            padding: 15px 25px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
        }
        .qr-placeholder {
            width: 50px;
            height: 50px;
            background: repeating-linear-gradient(90deg, #fff 0px, #fff 2px, #34495e 2px, #34495e 4px);
            filter: blur(4px);
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div class="label-card">
        <div class="header">
            <div class="brand">EcoCool Appliances</div>
            <div class="model-tag">Refrigerator-Freezer</div>
        </div>
        <div class="body">
            <div class="rating-section">
                <div class="efficiency-scale">
                    <div class="scale-title">Energy Efficiency Class</div>
                    <div class="scale-bar" style="position: relative;">
                        <div class="scale-step a-plus">A+</div>
                        <div class="scale-step a">A</div>
                        <div class="scale-step b">B</div>
                        <div class="scale-step c">C</div>
                        <div class="scale-step d">D</div>
                        <div class="arrow" style="top: 0; right: auto; left: 0; border-left-color: #27ae60;"></div>
                    </div>
                </div>
                <div class="consumption-box">
                    <div class="consumption-label">Annual Consumption</div>
                    <div class="consumption-value energy-blur">245</div>
                    <div class="consumption-unit">kWh/year</div>
                </div>
            </div>
            
            <table class="data-table">
                <tr>
                    <td>Model Number</td>
                    <td><span class="model-obscured">ECF-2024-B8847</span></td>
                </tr>
                <tr>
                    <td>Capacity</td>
                    <td>350 Liters</td>
                </tr>
                <tr>
                    <td>Climate Class</td>
                    <td>T (18°C - 43°C)</td>
                </tr>
                <tr>
                    <td>Freezer Rating</td>
                    <td>4 Star ****</td>
                </tr>
                <tr>
                    <td>Noise Level</td>
                    <td>38 dB(A)</td>
                </tr>
                <tr>
                    <td>Warranty Code</td>
                    <td><span class="warranty-code">WR-2024-X992</span></td>
                </tr>
            </table>
        </div>
        <div class="footer-bar">
            <div>EPREL Registration: <span style="filter: blur(3px); opacity: 0.6;">8847291</span></div>
            <div class="qr-placeholder"></div>
        </div>
    </div>
</body>
</html>
