<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Translator | Simple Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f7f7f8;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            max-width: 900px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
            padding: 32px 28px 40px;
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            color: #111111;
            margin-bottom: 6px;
        }

        .sub {
            font-size: 0.85rem;
            color: #6c6c70;
            border-left: 3px solid #d0d0d5;
            padding-left: 12px;
            margin-bottom: 32px;
            margin-top: 8px;
        }

        .translator-panel {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #3a3a3c;
        }

        .label span {
            font-size: 1.1rem;
        }

        textarea {
            width: 100%;
            padding: 18px 20px;
            font-family: 'Inter', 'SF Mono', monospace, system-ui;
            font-size: 1rem;
            line-height: 1.5;
            border: 1px solid #e2e2e4;
            border-radius: 24px;
            background: #fefefe;
            resize: vertical;
            outline: none;
            transition: 0.2s;
            color: #1c1c1e;
        }

        textarea:focus {
            border-color: #8e8e93;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.02);
            background: #ffffff;
        }

        textarea::placeholder {
            color: #b0b0b6;
            font-weight: 400;
        }

        .output-area {
            background: #fbfbfc;
            border-color: #eaeaea;
        }

        .separator {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: -6px 0;
        }

        .arrow-icon {
            background: #f2f2f5;
            width: 40px;
            height: 40px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a4a4e;
            font-size: 1.25rem;
        }

        @media (max-width: 550px) {
            .card {
                padding: 24px 20px;
            }
            textarea {
                padding: 14px 16px;
                font-size: 0.9rem;
            }
        }

        hr {
            margin: 8px 0 4px;
            border: none;
            border-top: 1px solid #efeff1;
        }

        .note {
            margin-top: 28px;
            text-align: center;
            font-size: 0.7rem;
            color: #8e8e93;
            background: #f9f9fb;
            padding: 12px 16px;
            border-radius: 40px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Translate <span style="font-weight: 400;">·</span> Studio</h1>
    <div class="sub">simple dual-panel interface · no actual translation</div>

    <div class="translator-panel">
        <div class="box">
            <div class="label">
                <span>📄</span> Source text
            </div>
            <textarea id="inputText" rows="4" placeholder="Type or paste your text here...&#10;Example: Hello, how are you?"></textarea>
        </div>

        <div class="separator">
            <div class="arrow-icon">↓</div>
        </div>

        <div class="box">
            <div class="label">
                <span>🌐</span> Translation (output)
            </div>
            <textarea id="outputText" class="output-area" rows="4" placeholder="Translated text will appear here (demo only)"></textarea>
        </div>
    </div>
    <hr />
    <div class="note">
        ⚡ Static demo — translation is not functional. This page only provides input/output layout.
    </div>
</div>

<script>
    (function() {
        const inputField = document.getElementById('inputText');
        const outputField = document.getElementById('outputText');
        
        if (inputField && outputField) {
            const updateOutputPlaceholder = () => {
                const rawValue = inputField.value;
                if (rawValue.trim() === "") {
                    outputField.value = "";
                    outputField.placeholder = "Translated text will appear here (demo only)";
                } else {
                    outputField.value = `[demo] ${rawValue}`;
                    outputField.placeholder = "";
                }
            };
            
            inputField.addEventListener('input', updateOutputPlaceholder);
            updateOutputPlaceholder();
        }
    })();
</script>
</body>
</html>
