<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · SocialFlow</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(145deg, #f0f4fa 0%, #e6ecf3 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .login-card {
      max-width: 440px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0,0,0,0.02);
      padding: 2.5rem 2rem;
      transition: transform 0.2s ease;
    }

    .login-card:hover {
      transform: scale(1.01);
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #0b2b40;
      margin-bottom: 0.5rem;
    }

    .brand i {
      color: #2d7a9b;
      font-size: 2.2rem;
    }

    .greeting {
      text-align: center;
      font-size: 1rem;
      font-weight: 400;
      color: #536878;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      padding-bottom: 1.25rem;
    }

    .input-group {
      margin-bottom: 1.25rem;
    }

    .input-group label {
      display: block;
      margin-bottom: 0.4rem;
      margin-left: 0.75rem;
      font-weight: 550;
      font-size: 0.9rem;
      color: #2b4556;
    }

    .input-icon-wrapper {
      position: relative;
      display: block;
      width: 100%;
    }

    .input-icon-wrapper i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #8a9aa8;
      font-size: 1.1rem;
      width: 1.2rem;
      text-align: center;
      pointer-events: none;
      transition: color 0.15s;
      z-index: 1;
    }

    .input-icon-wrapper input {
      width: 100%;
      padding: 0.9rem 1rem 0.9rem 3rem;
      font-size: 1rem;
      border: 1.5px solid #dbe3eb;
      border-radius: 20px;
      background: #ffffff;
      outline: none;
      transition: all 0.2s;
      color: #1e2f3d;
      font-weight: 450;
    }

    .input-icon-wrapper input:focus {
      border-color: #2d7a9b;
      box-shadow: 0 0 0 4px rgba(45, 122, 155, 0.12);
    }

    .input-icon-wrapper input:focus + i {
      color: #2d7a9b;
    }

    .row-flex {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0.5rem 0 1.8rem 0;
      font-size: 0.9rem;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      color: #2b4b5e;
      cursor: pointer;
    }

    .checkbox input[type="checkbox"] {
      width: 1.1rem;
      height: 1.1rem;
      accent-color: #2d7a9b;
      border-radius: 4px;
      cursor: pointer;
    }

    .forgot-link {
      color: #2d7a9b;
      text-decoration: none;
      font-weight: 550;
      border-bottom: 1px dashed transparent;
      transition: border-color 0.2s;
    }

    .forgot-link:hover {
      border-bottom: 1px dashed #2d7a9b;
    }

    .signin-btn {
      width: 100%;
      background: #1f5a7a;
      border: none;
      padding: 0.95rem;
      border-radius: 40px;
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 8px 18px -8px rgba(31, 90, 122, 0.5);
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .signin-btn i {
      font-size: 1.1rem;
    }

    .signin-btn:hover {
      background: #134b68;
      box-shadow: 0 10px 22px -8px #1f5a7a;
    }

    .signin-btn:active {
      transform: scale(0.98);
    }

    .separator {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 2rem 0 1.5rem 0;
      color: #7c8f9c;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .separator-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, #b7c7d4, transparent);
    }

    .social-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 1.7rem;
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #ffffff;
      border: 1.5px solid #d7e2eb;
      border-radius: 40px;
      padding: 0.7rem 0.5rem;
      font-size: 0.95rem;
      font-weight: 550;
      color: #2c4a5e;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
      backdrop-filter: blur(4px);
    }

    .social-btn i {
      font-size: 1.2rem;
    }

    .social-btn .fa-google {
      color: #DB4437;
    }
    .social-btn .fa-facebook-f {
      color: #1877F2;
    }

    .social-btn:hover {
      background: #f2f7fc;
      border-color: #a8c1d2;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    }

    .signup-prompt {
      text-align: center;
      font-size: 0.95rem;
      color: #3f5a6b;
      border-top: 1px solid rgba(0,0,0,0.04);
      padding-top: 1.5rem;
      margin-top: 0.5rem;
    }

    .signup-link {
      color: #1b5f81;
      font-weight: 650;
      text-decoration: none;
      margin-left: 0.3rem;
      border-bottom: 1.5px solid transparent;
      transition: border-color 0.2s;
    }

    .signup-link:hover {
      border-bottom: 1.5px solid #1b5f81;
    }

    .footnote {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #8fa3b2;
    }

    button {
      background: none;
      border: none;
      font-family: inherit;
    }

    :focus-visible {
      outline: 2px solid #2d7a9b;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <i class="fas fa-users-between-lines"></i>
      <span>SocialFlow</span>
    </div>
    <div class="greeting">
      <i class="fas fa-circle-nodes" style="margin-right: 6px; opacity: 0.7;"></i> 
      connect with the world
    </div>

    <form id="loginForm">
      <div class="input-group">
        <label for="emailOrUser">Email or username</label>
        <div class="input-icon-wrapper">
          <input type="text" id="emailOrUser" placeholder="" autocomplete="username">
          <i class="fas fa-user"></i>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="input-icon-wrapper">
          <input type="password" id="password" placeholder="" autocomplete="current-password">
          <i class="fas fa-lock"></i>
        </div>
      </div>

      <div class="row-flex">
        <label class="checkbox">
          <input type="checkbox" checked> 
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link" onclick="return false;">Forgot password?</a>
      </div>

      <button type="submit" class="signin-btn">
        <i class="fas fa-arrow-right-to-bracket"></i> Log in
      </button>
    </form>

    <div class="separator">
      <span class="separator-line"></span>
      <span>or continue with</span>
      <span class="separator-line"></span>
    </div>

    <div class="social-row">
      <button class="social-btn" type="button">
        <i class="fab fa-google"></i> Google
      </button>
      <button class="social-btn" type="button">
        <i class="fab fa-facebook-f"></i> Facebook
      </button>
    </div>

    <div class="signup-prompt">
      <span>Don't have an account?</span>
      <a href="#" class="signup-link" onclick="return false;">Sign up now</a>
    </div>

    <div class="footnote">
      <i class="fas fa-shield-halved" style="margin-right: 4px;"></i> 
      secure login — demo interface
    </div>
  </div>

  <script>
    (function() {
      const dummyLinks = document.querySelectorAll('a[href="#"]');
      dummyLinks.forEach(link => {
        link.addEventListener('click', (e) => e.preventDefault());
      });

      const loginForm = document.getElementById('loginForm');
      if (loginForm) {
        loginForm.addEventListener('submit', (event) => {
          event.preventDefault();
          alert('Incorrect password. Please try again.');
        });
      }

      const socialButtons = document.querySelectorAll('.social-btn');
      socialButtons.forEach(btn => {
        btn.addEventListener('click', () => {
          alert('Social login demo — connect with ' + (btn.innerText.includes('Google') ? 'Google' : 'Facebook'));
        });
      });
    })();
  </script>
</body>
</html>
